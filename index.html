    const lessonsData = [
      {
        id: "kuantum",
        title: "Kuantum Kuramı ve Orbitaller",
        subtitle: "AYT Kimya Müfredatı",
        content: "Modern atom teorisinde elektronların bulunma olasılığının en yüksek olduğu hacimsel bölgelere orbital denir. Orbitalleri belirleyen ve Schrödinger dalga denklemi çözümlerinden türetilen sayılara kuantum sayıları adı verilir.",

        quiz: [

      {
        id: "gazlar",
        title: "Gaz Yasaları ve İdeal Gaz",

        formulas: ["P \\cdot V = n \\cdot R \\cdot T", "P_1 \\cdot V_1 = P_2 \\cdot V_2"],
        quiz: [
          { q: "İdeal gaz denklemindeki 'R' sabiti değeri yaklaşık olarak kaçtır?", a: ["0.08206", "8.314", "İkisi de yerine göre doğrudur", "1.00"], correct: 2 }
        ]
      }

    function App() {
      const [activeTab, setActiveTab] = useState('Orbital');
      const [toast, setToast] = useState({ visible: false, message: '', type: 'success' });

      // Custom Toast Notification System
      const showToast = (message, type = 'success') => {
        setToast({ visible: true, message, type });
        setTimeout(() => setToast({ visible: false, message: '', type }), 3000);
      };

      // --- TAB: ORBITAL STATES & HOOKS ---
      const [activeOrbital, setActiveOrbital] = useState('p');
      const orbitalCanvasRef = useRef(null);
      const [rotation, setRotation] = useState({ x: 0.5, y: -0.6 });
      const [isDragging, setIsDragging] = useState(false);
      const dragStart = useRef({ x: 0, y: 0 });

      // --- TAB: 118 EL STATES ---
      const [searchTerm, setSearchTerm] = useState('');
      const [temperatureMode, setTemperatureMode] = useState(true);
      const [temperatureVal, setTemperatureVal] = useState(298);
      const [selectedElement, setSelectedElement] = useState(elementList[0]);

      // --- TAB: 3D LAB STATES ---
      const [activeGlassware, setActiveGlassware] = useState('Beherglas');
      const [activeAtomModel, setActiveAtomModel] = useState(null);
      const [labLiquidVol, setLabLiquidVol] = useState(150);
      const [labTemperature, setLabTemperature] = useState(25);
      const [isHeating, setIsHeating] = useState(false);
      const [selectedChemical, setSelectedChemical] = useState('Su');
      const [labPH, setLabPH] = useState(7.0);

      // --- TAB: DERS STATES ---
      const [currentLesson, setCurrentLesson] = useState(lessonsData[0]);
      const [quizIndex, setQuizIndex] = useState(0);
      const [userSelectedAnswer, setUserSelectedAnswer] = useState(null);
      const [score, setScore] = useState(0);

      // --- TAB: SENARYO STATES ---
      const [activeScenario, setActiveScenario] = useState('titration');
      const [titrationML, setTitrationML] = useState(0);
      const [sodiumStatus, setSodiumStatus] = useState('idle');

      // --- LAB TEMPERATURE PROCESS ---
      useEffect(() => {
        let timer;
        if (isHeating) {
          timer = setInterval(() => {
            setLabTemperature(t => Math.min(250, t + 4));
          }, 150);
        } else {
          timer = setInterval(() => {
            setLabTemperature(t => Math.max(25, t - 2));
          }, 300);
        }
        return () => clearInterval(timer);
      }, [isHeating]);

      const chemicalColor = useMemo(() => {
        switch (selectedChemical) {
          case 'HCl': return 'rgba(241, 245, 249, 0.2)';
          case 'NaOH': return 'rgba(148, 163, 184, 0.3)';
          case 'CuSO4': return 'rgba(14, 165, 233, 0.7)';
          case 'KMnO4': return 'rgba(147, 51, 234, 0.8)';
          case 'K2Cr2O7': return 'rgba(249, 115, 22, 0.85)';
          default: return 'rgba(56, 189, 248, 0.45)';
        }
      }, [selectedChemical]);

      // --- MATHEMATICAL LOBES POINT CLOUD GENERATOR ---
      const points = useMemo(() => {
        const pointCount = 1400;
        const pts = [];
        for (let i = 0; i < pointCount; i++) {
          let r, theta, phi;
          if (activeOrbital === 's') {
            r = Math.pow(Math.random(), 1.5) * 45;
            theta = Math.acos(2 * Math.random() - 1);
            phi = Math.random() * 2 * Math.PI;
            pts.push({
              x: r * Math.sin(theta) * Math.cos(phi),
              y: r * Math.sin(theta) * Math.sin(phi),
              z: r * Math.cos(theta)
            });
          } else if (activeOrbital === 'p') {
            const u = (Math.random() > 0.5 ? 1 : -1) * (0.12 + 0.88 * Math.random());
            const z = u * 52;
            const r_slice = 16 * Math.sin(Math.abs(u) * Math.PI);
            const theta = Math.random() * 2 * Math.PI;
            const fuzz = 1.5;
            pts.push({
              x: r_slice * Math.cos(theta) + (Math.random() - 0.5) * fuzz,
              y: r_slice * Math.sin(theta) + (Math.random() - 0.5) * fuzz,
              z: z + (Math.random() - 0.5) * fuzz
            });
          } else if (activeOrbital === 'd') {
            const lobe = Math.floor(Math.random() * 4);
            const baseAngle = lobe * Math.PI / 2 + Math.PI / 4;
            const u = 0.15 + 0.85 * Math.random();
            const dist = u * 48;
            const r_slice = 14 * Math.sin(u * Math.PI);
            const sliceAngle = Math.random() * 2 * Math.PI;
            pts.push({
              x: dist * Math.cos(baseAngle) + r_slice * Math.cos(sliceAngle) * 0.4,
              y: dist * Math.sin(baseAngle) + r_slice * Math.cos(sliceAngle) * 0.4,
              z: r_slice * Math.sin(sliceAngle)
            });
          } else if (activeOrbital === 'f') {
            const directions = [
              {x: 1, y: 1, z: 1}, {x: 1, y: 1, z: -1},
              {x: 1, y: -1, z: 1}, {x: 1, y: -1, z: -1},
              {x: -1, y: 1, z: 1}, {x: -1, y: 1, z: -1},
              {x: -1, y: -1, z: 1}, {x: -1, y: -1, z: -1}
            ];
            const dir = directions[Math.floor(Math.random() * 8)];
            const len = Math.sqrt(dir.x*dir.x + dir.y*dir.y + dir.z*dir.z);
            const dx = dir.x / len;
            const dy = dir.y / len;
            const dz = dir.z / len;

            const u = 0.2 + 0.8 * Math.random();
            const dist = u * 50;
            const r_slice = 11 * Math.sin(u * Math.PI);
            const sliceAngle = Math.random() * 2 * Math.PI;

            let temp = {x: 0, y: 1, z: 0};
            if (Math.abs(dy) > 0.9) temp = {x: 1, y: 0, z: 0};
            const px_x = dy * temp.z - dz * temp.y;
            const px_y = dz * temp.x - dx * temp.z;
            const px_z = dx * temp.y - dy * temp.x;
            const len_p = Math.sqrt(px_x*px_x + px_y*px_y + px_z*px_z);
            const u_x = px_x / len_p;
            const u_y = px_y / len_p;
            const u_z = px_z / len_p;

            const v_x = dy * u_z - dz * u_y;
            const v_y = dz * u_x - dx * u_z;
            const v_z = dx * u_y - dy * u_x;

            pts.push({
              x: dist * dx + r_slice * (Math.cos(sliceAngle) * u_x + Math.sin(sliceAngle) * v_x),
              y: dist * dy + r_slice * (Math.cos(sliceAngle) * u_y + Math.sin(sliceAngle) * v_y),
              z: dist * dz + r_slice * (Math.cos(sliceAngle) * u_z + Math.sin(sliceAngle) * v_z)
            });
          }
        }
        return pts;
      }, [activeOrbital]);

      // RENDERING CANVAS
      useEffect(() => {
        const canvas = orbitalCanvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let animId;

        const draw = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          const cx = canvas.width / 2;
          const cy = canvas.height / 2;

          ctx.strokeStyle = 'rgba(26, 29, 50, 0.4)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(cx - 80, cy); ctx.lineTo(cx + 80, cy);
          ctx.moveTo(cx, cy - 80); ctx.lineTo(cx, cy + 80);
          ctx.stroke();

          const cosX = Math.cos(rotation.x);
          const sinX = Math.sin(rotation.x);
          const cosY = Math.cos(rotation.y);
          const sinY = Math.sin(rotation.y);

          const projected = points.map(p => {
            let x1 = p.x * cosY - p.z * sinY;
            let z1 = p.x * sinY + p.z * cosY;
            let y2 = p.y * cosX - z1 * sinX;
            let z2 = p.y * sinX + z1 * cosX;
            return { x: x1, y: y2, z: z2 };
          }).sort((a, b) => b.z - a.z);

          projected.forEach(p => {
            const factor = (p.z + 100) / 120;
            const size = Math.max(1, factor * 2.3);
            const alpha = Math.min(1, Math.max(0.12, factor * 0.75));

            if (activeOrbital === 'p') {
              ctx.fillStyle = `rgba(45, 212, 191, ${alpha})`;
            } else if (activeOrbital === 'd') {
              ctx.fillStyle = `rgba(245, 158, 11, ${alpha})`;
            } else if (activeOrbital === 'f') {
              ctx.fillStyle = `rgba(192, 132, 252, ${alpha})`;
            } else {
              ctx.fillStyle = `rgba(59, 130, 246, ${alpha})`;
            }

            ctx.beginPath();
            ctx.arc(cx + p.x * 1.8, cy + p.y * 1.8, size, 0, Math.PI * 2);
            ctx.fill();
          });

          animId = requestAnimationFrame(draw);
        };

        draw();
        return () => cancelAnimationFrame(animId);
      }, [points, rotation, activeOrbital]);

      // RENDERING ATOMIC THEORIES ON THE FLY
      const atomCanvasRef = useRef(null);
      useEffect(() => {
        const canvas = atomCanvasRef.current;
        if (!canvas || !activeAtomModel || activeTab !== '3D Lab') return;
        const ctx = canvas.getContext('2d');
        let animId;
        let angle = 0;

        const particlesArr = Array.from({ length: 8 }, () => ({
          x: -20,
          y: Math.random() * 120 + 40,
          speed: Math.random() * 2 + 2,
          deflected: false
        }));

        const drawAtom = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          const cx = canvas.width / 2;
          const cy = canvas.height / 2;

          if (activeAtomModel === 'Dalton') {
            const grad = ctx.createRadialGradient(cx - 30, cy - 30, 5, cx, cy, 70);
            grad.addColorStop(0, '#475569'); grad.addColorStop(1, '#020617');
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(cx, cy, 65, 0, Math.PI*2); ctx.fill();
          } else if (activeAtomModel === 'Thomson') {
            ctx.fillStyle = 'rgba(239, 68, 68, 0.1)';
            ctx.beginPath(); ctx.arc(cx, cy, 65, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#ef4444'; ctx.stroke();
            // Negative electrons
            [{x:-20,y:-10},{x:20,y:20},{x:-10,y:25}].forEach(el => {
              ctx.fillStyle = '#3b82f6';
              ctx.beginPath(); ctx.arc(cx+el.x, cy+el.y, 6, 0, Math.PI*2); ctx.fill();
            });
          } else if (activeAtomModel === 'Rutherf.') {
            ctx.fillStyle = '#fbbf24';
            ctx.beginPath(); ctx.arc(cx, cy, 12, 0, Math.PI*2); ctx.fill();
            particlesArr.forEach(p => {
              ctx.fillStyle = '#10b981';
              ctx.beginPath(); ctx.arc(p.x, p.y, 4.5, 0, Math.PI*2); ctx.fill();
              p.x += p.speed;
              if (Math.abs(p.x - cx) < 25 && !p.deflected) {
                p.deflected = true;
                p.y += (p.y - cy) * 0.55;
              }
              if (p.x > canvas.width) { p.x = -10; p.deflected = false; }
            });
          } else if (activeAtomModel === 'Bohr') {
            ctx.fillStyle = '#ef4444';
            ctx.beginPath(); ctx.arc(cx, cy, 10, 0, Math.PI*2); ctx.fill();
            [35, 65].forEach((r, idx) => {
              ctx.strokeStyle = 'rgba(255,255,255,0.1)';
              ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
              const elAngle = angle * (1.5 / (idx + 1));
              ctx.fillStyle = '#38bdf8';
              ctx.beginPath(); ctx.arc(cx + Math.cos(elAngle)*r, cy + Math.sin(elAngle)*r, 5, 0, Math.PI*2); ctx.fill();
            });
          }
          angle += 0.04;
          animId = requestAnimationFrame(drawAtom);
        };
        drawAtom();
        return () => cancelAnimationFrame(animId);
      }, [activeAtomModel, activeTab]);

      const handleStart = (e) => {
        setIsDragging(true);
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                  <button onClick={() => { setActiveScenario('sodium'); setSodiumStatus('idle'); }} className={`px-4 py-2 rounded-xl text-xs font-bold ${activeScenario === 'sodium' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>Sodyum-Su</button>
                </div>

                {activeScenario === 'titration' ? (
                  <div className="bg-[#0e1122] border border-[#1d223d] p-5 rounded-2xl space-y-4">
                    <div className="flex justify-between items-center text-xs">
                      <span>Eklenen NaOH: {titrationML} mL</span>
                      <span className="text-pink-400 font-bold">pH: {titrationML < 20 ? (1.5 + titrationML*0.25).toFixed(2) : (7.0 + (titrationML-20)*0.35).toFixed(2)}</span>
                    </div>
                    <div className="w-full bg-[#05060a] border border-[#161a30] rounded-xl p-4 flex flex-col items-center">
                      <div className="w-14 h-20 border-2 border-slate-600 rounded-b-lg relative overflow-hidden flex items-end">
                        <div className="w-full transition-all duration-300" style={{ height: '50%', backgroundColor: titrationML < 20 ? 'rgba(255,255,255,0.05)' : 'rgba(236, 72, 153, 0.7)' }}></div>
                      </div>
                    </div>
                    <div className="flex space-x-2">
                      <button onClick={() => setTitrationML(m => Math.min(50, m + 2))} className="flex-1 py-2.5 bg-blue-600 text-white text-xs font-bold rounded-xl">NaOH Ekle 💧</button>
                      <button onClick={() => setTitrationML(0)} className="px-4 py-2.5 bg-slate-800 text-slate-300 text-xs font-bold rounded-xl">Sıfırla</button>
                    </div>
                  </div>
                ) : (
                  <div className="bg-[#0e1122] border border-[#1d223d] p-5 rounded-2xl space-y-4">
                    <div className="w-full h-40 bg-[#05060a] border border-[#161a30] rounded-xl flex items-center justify-center relative overflow-hidden">
                      {sodiumStatus === 'reacting' && <span className="text-4xl animate-bounce">⚡💥</span>}
                      {sodiumStatus === 'exploded' && <span className="text-rose-400 text-xs font-bold">PATLAMA GERÇEKLEŞTİ! 💥</span>}
                      {sodiumStatus === 'idle' && <span className="text-slate-500 text-xs">Sodyum metali atılmaya hazır.</span>}
                    </div>
                    <button
                      onClick={() => {
                        setSodiumStatus('reacting');
                        setTimeout(() => setSodiumStatus('exploded'), 1200);
                      }}
                      disabled={sodiumStatus !== 'idle'}
                      className="w-full py-2.5 bg-rose-600 text-white text-xs font-bold rounded-xl"
                    >
                      {sodiumStatus === 'idle' ? 'Sodyum Metalini Suya Bırak! 💥' : 'Tepkime Bitti'}
                    </button>
                  </div>
                )}
              </div>
            )}

          </main>

          {/* NAV BAR */}
          <nav className="fixed bottom-0 left-0 right-0 bg-[#0a0c16]/95 border-t border-[#14192d] py-3.5 px-4 flex justify-around items-center z-50 max-w-lg mx-auto rounded-t-3xl shadow-2xl">
            {[
              { id: 'Ders', label: 'Ders', icon: '📖' },
              { id: '3D Lab', label: '3D Lab', icon: '🧪' },
              { id: 'Orbital', label: 'Orbital', icon: '🌀' },
              { id: '118 El.', label: '118 El.', icon: '📊' },
              { id: 'Güvenlik', label: 'Güvenlik', icon: '⚠️' },
              { id: 'Videolar', label: 'Videolar', icon: '🎥' },
              { id: 'Senaryo', label: 'Senaryo', icon: '🎮' }
            ].map(tab => {
              const isActive = activeTab === tab.id;
              return (
                <button
                  key={tab.id}
                  onClick={() => setActiveTab(tab.id)}
                  className={`flex flex-col items-center justify-center transition-all ${
                    isActive
                      ? 'bg-[#2563eb] text-white font-extrabold scale-110 shadow-lg shadow-[#2563eb]/25 px-4 py-2 rounded-2xl'
                      : 'text-slate-500 hover:text-slate-300 px-2 py-1'
                  }`}
                >
                  <span className="text-base mb-0.5">{tab.icon}</span>
                  <span className="text-[10px] tracking-tight">{tab.label}</span>
                </button>
              );
            })}
          </nav>

          {/* CUSTOM TOAST NOTIFICATION OVERLAY */}
          {toast.visible && (
            <div className="fixed top-20 left-1/2 -translate-x-1/2 z-50 animate-fadeIn pointer-events-none">
              <div className="px-4 py-2.5 rounded-xl border border-emerald-500/40 bg-emerald-500/10 text-emerald-300 text-xs font-bold shadow-2xl flex items-center space-x-2">
                <span>✅</span>
                <span>{toast.message}</span>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
