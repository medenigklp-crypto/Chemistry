<script>
// ===== 3D ENGINE =====
let W=600, H=500, rotX=0.4, rotY=0.3, isDragging=false, lastX=0, lastY=0;
let autoSpin=true, spd=1, t=0, activeItem=null, animFrame=null, zoom=1, lastDist=0;

function rotate3D(x,y,z){
    let y1=y*Math.cos(rotX)-z*Math.sin(rotX);
    let z1=y*Math.sin(rotX)+z*Math.cos(rotX);
    let x2=x*Math.cos(rotY)+z1*Math.sin(rotY);
    let z2=-x*Math.sin(rotY)+z1*Math.cos(rotY);
    return {x:x2,y:y1,z:z2};
}
function project(x,y,z,cx,cy){
    const r=rotate3D(x,y,z);
    const scale=280*zoom/(350+r.z);
    return {x:(cx||W/2)+r.x*scale,y:(cy||H/2)+r.y*scale,z:r.z,scale:scale};
}
function rgba(r,g,b,a){return `rgba(${r},${g},${b},${a})`;}

function drawMesh(tris,baseR,baseG,baseB,alpha){
    tris.sort((a,b)=>b.avgZ-a.avgZ);
    tris.forEach(tri=>{
        const depth=Math.max(0.15,Math.min(1,1-(tri.avgZ+150)/400));
        c.beginPath();c.moveTo(tri.p[0].x,tri.p[0].y);c.lineTo(tri.p[1].x,tri.p[1].y);c.lineTo(tri.p[2].x,tri.p[2].y);c.closePath();
        c.fillStyle=rgba(baseR,baseG,baseB,alpha*depth*0.65);c.fill();
        c.strokeStyle=rgba(baseR,baseG,baseB,0.3*depth);c.lineWidth=0.5;c.stroke();
    });
}

function sphere(cx,cy,cz,rx,ry,rz,slices,stacks,color,alpha){
    const tris=[];
    for(let i=0;i<slices;i++){
        for(let j=0;j<stacks;j++){
            const u1=(Math.PI*2/slices)*i,u2=(Math.PI*2/slices)*(i+1);
            const v1=(Math.PI/stacks)*j-Math.PI/2,v2=(Math.PI/stacks)*(j+1)-Math.PI/2;
            const pts=[
                project(cx+rx*Math.cos(v1)*Math.cos(u1),cy+ry*Math.cos(v1)*Math.sin(u1),cz+rz*Math.sin(v1)),
                project(cx+rx*Math.cos(v1)*Math.cos(u2),cy+ry*Math.cos(v1)*Math.sin(u2),cz+rz*Math.sin(v1)),
                project(cx+rx*Math.cos(v2)*Math.cos(u2),cy+ry*Math.cos(v2)*Math.sin(u2),cz+rz*Math.sin(v2)),
                project(cx+rx*Math.cos(v2)*Math.cos(u1),cy+ry*Math.cos(v2)*Math.sin(u1),cz+rz*Math.sin(v2))
            ];
            tris.push({p:[pts[0],pts[1],pts[2]],avgZ:(pts[0].z+pts[1].z+pts[2].z)/3});
            tris.push({p:[pts[0],pts[2],pts[3]],avgZ:(pts[0].z+pts[2].z+pts[3].z)/3});
        }
    }
    drawMesh(tris,color[0],color[1],color[2],alpha);
}

function cylinder(cx,cy,cz,r,h,slices,color,alpha){
    const tris=[];
    for(let i=0;i<slices;i++){
        const a1=(Math.PI*2/slices)*i,a2=(Math.PI*2/slices)*(i+1);
        const x1=Math.cos(a1)*r,z1=Math.sin(a1)*r,x2=Math.cos(a2)*r,z2=Math.sin(a2)*r;
        const p1=project(cx+x1,cy-h/2,cz+z1),p2=project(cx+x2,cy-h/2,cz+z2);
        const p3=project(cx+x2,cy+h/2,cz+z2),p4=project(cx+x1,cy+h/2,cz+z1);
        tris.push({p:[p1,p2,p3],avgZ:(p1.z+p2.z+p3.z)/3});
        tris.push({p:[p1,p3,p4],avgZ:(p1.z+p3.z+p4.z)/3});
        const pc=project(cx,cy+h/2,cz);tris.push({p:[pc,p4,p3],avgZ:(pc.z+p4.z+p3.z)/3});
        const pb=project(cx,cy-h/2,cz);tris.push({p:[pb,p2,p1],avgZ:(pb.z+p2.z+p1.z)/3});
    }
    drawMesh(tris,color[0],color[1],color[2],alpha);
}

function hollowCylinder(cx,cy,cz,r,h,slices,color,alpha){
    const tris=[];
    for(let i=0;i<slices;i++){
        const a1=(Math.PI*2/slices)*i,a2=(Math.PI*2/slices)*(i+1);
        const x1=Math.cos(a1)*r,z1=Math.sin(a1)*r,x2=Math.cos(a2)*r,z2=Math.sin(a2)*r;
        const p1=project(cx+x1,cy-h/2,cz+z1),p2=project(cx+x2,cy-h/2,cz+z2);
        const p3=project(cx+x2,cy+h/2,cz+z2),p4=project(cx+x1,cy+h/2,cz+z1);
        tris.push({p:[p1,p2,p3],avgZ:(p1.z+p2.z+p3.z)/3});
        tris.push({p:[p1,p3,p4],avgZ:(p1.z+p3.z+p4.z)/3});
    }
    drawMesh(tris,color[0],color[1],color[2],alpha);
}

function cone(cx,cy,cz,r,h,slices,color,alpha,flip){
    const tris=[];
    const topY=flip?cy-h:cy+h,baseY=flip?cy:cy;
    for(let i=0;i<slices;i++){
        const a1=(Math.PI*2/slices)*i,a2=(Math.PI*2/slices)*(i+1);
        const x1=Math.cos(a1)*r,z1=Math.sin(a1)*r,x2=Math.cos(a2)*r,z2=Math.sin(a2)*r;
        const pt=project(cx,topY,cz),p1=project(cx+x1,baseY,cz+z1),p2=project(cx+x2,baseY,cz+z2);
        tris.push({p:[pt,p2,p1],avgZ:(pt.z+p2.z+p1.z)/3});
        if(!flip){const pc=project(cx,baseY,cz);tris.push({p:[pc,p1,p2],avgZ:(pc.z+p1.z+p2.z)/3});}
    }
    drawMesh(tris,color[0],color[1],color[2],alpha);
}

function torus(cx,cy,cz,majorR,minorR,slices,stacks,color,alpha){
    const tris=[];
    for(let i=0;i<slices;i++){
        for(let j=0;j<stacks;j++){
            const u1=(Math.PI*2/slices)*i,u2=(Math.PI*2/slices)*(i+1);
            const v1=(Math.PI*2/stacks)*j,v2=(Math.PI*2/stacks)*(j+1);
            const pts=[
                project(cx+(majorR+minorR*Math.cos(v1))*Math.cos(u1),cy+(majorR+minorR*Math.cos(v1))*Math.sin(u1),cz+minorR*Math.sin(v1)),
                project(cx+(majorR+minorR*Math.cos(v1))*Math.cos(u2),cy+(majorR+minorR*Math.cos(v1))*Math.sin(u2),cz+minorR*Math.sin(v1)),
                project(cx+(majorR+minorR*Math.cos(v2))*Math.cos(u2),cy+(majorR+minorR*Math.cos(v2))*Math.sin(u2),cz+minorR*Math.sin(v2)),
                project(cx+(majorR+minorR*Math.cos(v2))*Math.cos(u1),cy+(majorR+minorR*Math.cos(v2))*Math.sin(u1),cz+minorR*Math.sin(v2))
            ];
            tris.push({p:[pts[0],pts[1],pts[2]],avgZ:(pts[0].z+pts[1].z+pts[2].z)/3});
            tris.push({p:[pts[0],pts[2],pts[3]],avgZ:(pts[0].z+pts[2].z+pts[3].z)/3});
        }
    }
    drawMesh(tris,color[0],color[1],color[2],alpha);
}

function tube(cx,cy,cz,r,path,color,alpha){
    const tris=[],segs=path.length-1,slices=12;
    for(let s=0;s<segs;s++){
        const p1=path[s],p2=path[s+1];
        const dx=p2.x-p1.x,dy=p2.y-p1.y,dz=p2.z-p1.z;
        const len=Math.sqrt(dx*dx+dy*dy+dz*dz);
        const nx=dx/len,ny=dy/len,nz=dz/len;
        let perp1={x:0,y:0,z:0};
        if(Math.abs(ny)<0.9)perp1={x:-nz,y:0,z:nx};else perp1={x:1,y:0,z:0};
        const l1=Math.sqrt(perp1.x*perp1.x+perp1.y*perp1.y+perp1.z*perp1.z);
        perp1.x/=l1;perp1.y/=l1;perp1.z/=l1;
        const perp2={x:ny*perp1.z-nz*perp1.y,y:nz*perp1.x-nx*perp1.z,z:nx*perp1.y-ny*perp1.x};
        for(let i=0;i<slices;i++){
            const a1=(Math.PI*2/slices)*i,a2=(Math.PI*2/slices)*(i+1);
            const c1a=Math.cos(a1),s1a=Math.sin(a1),c2a=Math.cos(a2),s2a=Math.sin(a2);
            const v1={x:cx+p1.x+r*(perp1.x*c1a+perp2.x*s1a),y:cy+p1.y+r*(perp1.y*c1a+perp2.y*s1a),z:cz+p1.z+r*(perp1.z*c1a+perp2.z*s1a)};
            const v2={x:cx+p1.x+r*(perp1.x*c2a+perp2.x*s2a),y:cy+p1.y+r*(perp1.y*c2a+perp2.y*s2a),z:cz+p1.z+r*(perp1.z*c2a+perp2.z*s2a)};
            const v3={x:cx+p2.x+r*(perp1.x*c2a+perp2.x*s2a),y:cy+p2.y+r*(perp1.y*c2a+perp2.y*s2a),z:cz+p2.z+r*(perp1.z*c2a+perp2.z*s2a)};
            const v4={x:cx+p2.x+r*(perp1.x*c1a+perp2.x*s1a),y:cy+p2.y+r*(perp1.y*c1a+perp2.y*s1a),z:cz+p2.z+r*(perp1.z*c1a+perp2.z*s1a)};
            const pv1=project(v1.x,v1.y,v1.z),pv2=project(v2.x,v2.y,v2.z),pv3=project(v3.x,v3.y,v3.z),pv4=project(v4.x,v4.y,v4.z);
            tris.push({p:[pv1,pv2,pv3],avgZ:(pv1.z+pv2.z+pv3.z)/3});
            tris.push({p:[pv1,pv3,pv4],avgZ:(pv1.z+pv3.z+pv4.z)/3});
        }
    }
    drawMesh(tris,color[0],color[1],color[2],alpha);
}

function flatDisc(cx,cy,cz,r,color,alpha){
    const tris=[],slices=16,pc=project(cx,cy,cz);
    for(let i=0;i<slices;i++){
        const a1=(Math.PI*2/slices)*i,a2=(Math.PI*2/slices)*(i+1);
        const p1=project(cx+Math.cos(a1)*r,cy,cz+Math.sin(a1)*r),p2=project(cx+Math.cos(a2)*r,cy,cz+Math.sin(a2)*r);
        tris.push({p:[pc,p1,p2],avgZ:(pc.z+p1.z+p2.z)/3});
    }
    drawMesh(tris,color[0],color[1],color[2],alpha);
}

// ===== GRADUATION MARK HELPER =====
function drawGradMarks(cx,cy,cz,r,h,steps,color,side){
    for(let i=0;i<steps;i++){
        const y=cy-h/2+i*(h/steps);
        const isMajor=i%5===0;
        const markLen=isMajor?10:5;
        c.strokeStyle=rgba(color[0],color[1],color[2],isMajor?0.5:0.25);
        c.lineWidth=isMajor?1.2:0.7;
        const p1=project(cx+r,side?y:cy,cz+(side?0:y-cy));
        const p2=project(cx+r+markLen,side?y:cy,cz+(side?0:y-cy));
        c.beginPath();c.moveTo(p1.x,p1.y);c.lineTo(p2.x,p2.y);c.stroke();
    }
}
