<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ronya — YKS Kimya</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap');
:root{--bg:#08090f;--sf:#0f1117;--sf2:#161922;--sf3:#1c2030;--br:#1e2535;--br2:#252d40;--ac:#6366f1;--ac2:#818cf8;--gr:#22c55e;--rd:#ef4444;--yw:#f59e0b;--tx:#f1f5f9;--tx2:#94a3b8;--tx3:#475569;}
*{box-sizing:border-box;margin:0;padding:0;}body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh;}
.app{max-width:960px;margin:0 auto;}
header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(8,9,15,0.98);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--br);}
.logo{font-family:'Space Grotesk',sans-serif;font-size:23px;font-weight:800;background:linear-gradient(135deg,#a5b4fc,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer;}
.screen{display:none;padding:16px;}
.screen.active{display:block;}
.card{background:var(--sf);border:1px solid var(--br);border-radius:16px;padding:20px;margin:16px 0;}
.btn{width:100%;padding:16px;background:var(--ac);color:white;border:none;border-radius:12px;font-weight:600;font-size:16px;margin:8px 0;cursor:pointer;}
.btn2{background:var(--sf2);color:var(--tx);}
.pt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:6px;margin-top:10px;}
.pt-cell{background:#1e2535;border:2px solid #475569;border-radius:10px;padding:6px;text-align:center;cursor:pointer;transition:all .2s;height:78px;display:flex;flex-direction:column;justify-content:center;}
.pt-cell:hover{transform:scale(1.12);border-color:#a5b4fc;box-shadow:0 0 20px rgba(99,102,241,0.5);}
.pt-cell .num{font-size:9px;color:#94a3b8;}
.pt-cell .sym{font-size:18px;font-weight:800;}
.pt-cell .name{font-size:8.5px;color:#cbd5e1;margin-top:2px;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:200;}
.modal-content{background:var(--sf);border:1px solid var(--br);border-radius:16px;padding:24px;max-width:420px;width:90%;text-align:center;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e2535;padding:14px 24px;border-radius:999px;color:white;z-index:1000;opacity:0;transition:.4s;max-width:300px;text-align:center;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="app">

<header>
  <div class="logo" onclick="nav('home')">Ronya</div>
  <div style="color:var(--tx2);font-size:13px;">YKS Kimya</div>
</header>

<!-- ANA SAYFA -->
<div id="s-home" class="screen active">
  <div style="text-align:center;padding:40px 20px;">
    <h1 style="font-size:32px;margin-bottom:8px;">Kimya İçin Her Şey</h1>
    <p style="color:var(--tx2);">TYT • AYT Hazırlık</p>
  </div>
  <div class="card">
    <button class="btn" onclick="nav('pt')">🔬 Periyodik Tablo</button>
    <button class="btn" onclick="nav('mol')">⚖️ Mol Hesaplayıcı</button>
    <button class="btn" onclick="nav('quiz')">🧪 Element Testi</button>
  </div>
</div>

<!-- PERİYODİK TABLO -->
<div id="s-pt" class="screen">
  <h2>🔬 Periyodik Tablo</h2>
  <p style="color:var(--tx2);margin-bottom:12px;">Elemente dokunarak detayları gör</p>
  <div id="pt-grid" class="pt-grid"></div>
  <button class="btn btn2" onclick="nav('home')">← Ana Sayfa</button>
</div>

<!-- MOL HESAPLAYICI -->
<div id="s-mol" class="screen">
  <h2>⚖️ Mol Hesaplayıcı</h2>
  <div class="card">
    <input type="number" id="mk0" placeholder="Molar Kütle (g/mol)" style="width:100%;padding:14px;margin:8px 0;background:#161922;border:1px solid #475569;border-radius:10px;color:white;">
    <select id="mk1" style="width:100%;padding:14px;margin:8px 0;background:#161922;border:1px solid #475569;border-radius:10px;color:white;">
      <option value="m2k">Mol → Kütle</option>
      <option value="k2m">Kütle → Mol</option>
    </select>
    <input type="number" id="mk2" placeholder="Değer" style="width:100%;padding:14px;margin:8px 0;background:#161922;border:1px solid #475569;border-radius:10px;color:white;">
    <button class="btn" onclick="calcMK()">Hesapla</button>
    <div id="mkr" style="display:none;margin-top:15px;padding:18px;background:#0f1117;border-radius:12px;text-align:center;">
      <strong>Sonuç: <span id="mkrv" style="color:#a5b4fc;font-size:20px;"></span></strong>
    </div>
  </div>
  <button class="btn btn2" onclick="nav('home')">← Ana Sayfa</button>
</div>

<!-- ELEMENT TESTİ -->
<div id="s-quiz" class="screen">
  <h2>🧪 Element Testi</h2>
  <div class="card" style="text-align:center;padding:60px 20px;">
    <button class="btn" onclick="startQuiz()">Teste Başla</button>
  </div>
  <button class="btn btn2" onclick="nav('home')">← Ana Sayfa</button>
</div>

</div>

<!-- DETAY MODAL -->
<div id="detail-modal" class="modal">
  <div class="modal-content">
    <h2 id="modal-sym" style="font-size:52px;margin:0;color:#a5b4fc;"></h2>
    <h3 id="modal-name" style="margin:8px 0 16px;color:#f1f5f9;"></h3>
    <p id="modal-info" style="color:var(--tx2);line-height:1.7;font-size:15px;"></p>
    <button class="btn" onclick="closeModal()" style="margin-top:20px;">Kapat</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ====================== ELEMENT VERİLERİ (Lantanit & Aktinit Elektron Konfigürasyonları Dahil) ======================
const elements = [
  {n:1,sym:"H",name:"Hidrojen",group:"Ametal",color:"#4ade80",config:"1s¹"},
  {n:2,sym:"He",name:"Helyum",group:"Soy Gaz",color:"#f472b6",config:"1s²"},
  {n:3,sym:"Li",name:"Lityum",group:"Alkali Metal",color:"#ef4444",config:"[He] 2s¹"},
  {n:4,sym:"Be",name:"Berilyum",group:"Toprak Alkali",color:"#f97316",config:"[He] 2s²"},
  {n:57,sym:"La",name:"Lantanyum",group:"Lantanit",color:"#7dd3fc",config:"[Xe] 5d¹ 6s²"},
  {n:58,sym:"Ce",name:"Seryum",group:"Lantanit",color:"#7dd3fc",config:"[Xe] 4f¹ 5d¹ 6s²"},
  {n:59,sym:"Pr",name:"Praseodim",group:"Lantanit",color:"#7dd3fc",config:"[Xe] 4f³ 6s²"},
  {n:89,sym:"Ac",name:"Aktinyum",group:"Aktinit",color:"#94a3b8",config:"[Rn] 6d¹ 7s²"},
  {n:90,sym:"Th",name:"Toryum",group:"Aktinit",color:"#94a3b8",config:"[Rn] 6d² 7s²"},
  {n:92,sym:"U",name:"Uranyum",group:"Aktinit",color:"#94a3b8",config:"[Rn] 5f³ 6d¹ 7s²"},
  {n:118,sym:"Og",name:"Oganesson",group:"Soy Gaz",color:"#f472b6",config:"[Rn] 5f¹⁴ 6d¹⁰ 7s² 7p⁶"}
];

function nav(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-' + id).classList.add('active');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function showDetail(el) {
  document.getElementById('modal-sym').textContent = el.sym;
  document.getElementById('modal-name').textContent = el.name;
  document.getElementById('modal-info').innerHTML = `
    <strong>Atom Numarası:</strong> ${el.n}<br>
    <strong>Grup:</strong> ${el.group}<br>
    <strong>Elektron Konfigürasyonu:</strong> ${el.config}
  `;
  document.getElementById('detail-modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('detail-modal').style.display = 'none';
}

function renderPeriodicTable() {
  const grid = document.getElementById('pt-grid');
  grid.innerHTML = '';
  elements.forEach(el => {
    const cell = document.createElement('div');
    cell.className = 'pt-cell';
    cell.style.borderColor = el.color + '99';
    cell.innerHTML = `
      <div class="num">${el.n}</div>
      <div class="sym" style="color:${el.color}">${el.sym}</div>
      <div class="name">${el.name}</div>
    `;
    cell.onclick = () => showDetail(el);
    grid.appendChild(cell);
  });
}

function calcMK() {
  const mw = parseFloat(document.getElementById('mk0').value) || 0;
  const val = parseFloat(document.getElementById('mk2').value) || 0;
  const type = document.getElementById('mk1').value;
  if (mw === 0 || val === 0) return toast("Değerleri doldurun");
  let result = type === "m2k" ? (val * mw).toFixed(3) : (val / mw).toFixed(4);
  document.getElementById('mkrv').textContent = result + (type === "m2k" ? " g" : " mol");
  document.getElementById('mkr').style.display = 'block';
  toast("Hesaplandı ✓");
}

function startQuiz() {
  toast("Element Testi başlıyor...");
  setTimeout(() => {
    const q = prompt("Soru 1: H sembolü hangi elementindir?");
    if (q && q.toLowerCase().includes("hidrojen")) toast("✅ Doğru!");
    else toast("❌ H = Hidrojen");
  }, 400);
}

document.addEventListener('DOMContentLoaded', () => {
  renderPeriodicTable();
  toast("Lantanit ve Aktinit elektron konfigürasyonları eklendi! 🎉");
});
</script>
</body>
</html>
