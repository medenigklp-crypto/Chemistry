<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Roni 3D Kimya Laboratuvarı - Gelişmiş Render Çekirdeği</title>
    <style>
        body { margin: 0; background: #05070f; color: #fff; font-family: 'SF Pro Display', -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .lab-wrapper { display: flex; gap: 40px; align-items: center; background: rgba(255,255,255,0.02); padding: 30px; border-radius: 24px; box-shadow: 0 30px 100px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(20px); }
        canvas { background: transparent; cursor: grab; filter: drop-shadow(0px 10px 30px rgba(0,0,0,0.7)); }
        canvas:active { cursor: grabbing; }
        .panel { width: 300px; display: flex; flex-direction: column; gap: 20px; }
        .hud-card { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 14px; }
        .hud-value { font-family: 'Courier New', monospace; font-size: 24px; color: #00ffcc; font-weight: bold; margin-top: 5px; }
        .btn { background: linear-gradient(135deg, #2c3e50, #3498db); border: none; color: white; padding: 14px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(52, 152, 219, 0.4); }
        .btn.reactive { background: linear-gradient(135deg, #e74c3c, #9b59b6); }
    </style>
</head>
<body>

<div class="lab-wrapper">
    <!-- Gelişmiş Fizik ve Akışkan Canvası -->
    <canvas id="glCanvas" width="360" height="500"></canvas>

    <!-- Kontrol ve HUD Paneli -->
    <div class="panel">
        <div class="hud-card">
            <label style="color: #aaa; font-size: 12px; text-transform: uppercase; letter-spacing: 1px;">Moleküler Termal İvme</label>
            <div id="tempHUD" class="hud-value">25.00 °C</div>
        </div>
        <div class="hud-card">
            <label style="color: #aaa; font-size: 12px; text-transform: uppercase; letter-spacing: 1px;">Aktif Reaksiyon Matrisi</label>
            <div id="formulaHUD" style="color: #ff9f43; font-size: 16px;" class="hud-value">-</div>
        </div>
        
        <button class="btn" onclick="addReagent('Cu')">Bakır İyonu Ekle (Cu²⁺)</button>
        <button class="btn reactive" onclick="addReagent('NH3')">Amonyak Çözeltisi (NH₃)</button>
        <button class="btn" style="background: #27ae60;" onclick="shakeBeaker()">Kinetik Karıştırma Trigger</button>
    </div>
</div>

<script>
const canvas = document.getElementById('glCanvas');
const ctx = canvas.getContext('2d');

// --- HASSAS FİZİK VE DALGA MOTORU ---
let liquid = {
    level: 250,        // Yükseklik hedefi
    currentLevel: 500, // Başlangıç animasyon seviyesi (aşağıdan dolar)
    waveHeight: 0,     // Anlık dalga genliği
    waveSpeed: 0,      // Dalga hızı
    targetColor: { r: 40, g: 120, b: 240, a: 0.6 }, // İlk renk (Açık Mavi Bakır Çözeltisi)
    currentColor: { r: 40, g: 120, b: 240, a: 0.6 },
    particles: [],
    temperature: 25.00
};

// Çözelti İndikatör Kompleksleri
let stateHistory = ['Cu'];

// Kinetik Enerji İvmesi (Sallama simülasyonu)
let angle = 0;
let tilt = 0;
let targetTilt = 0;

function addReagent(type) {
    if(type === 'NH3' && stateHistory.includes('Cu')) {
        // Kompleks bileşik oluşumu: Kompleks iyonlar derin lacivert/gece mavisi tonu alır
        liquid.targetColor = { r: 10, g: 30, b: 150, a: 0.85 }; 
        liquid.waveSpeed = 0.4;
        liquid.waveHeight = 25; // Reaksiyon şoku dalgalanması
        document.getElementById('formulaHUD').innerText = "[Cu(NH₃)₄]²⁺ (Derin Mavi)";
        
        // Egzotermik reaksiyon termal sıçrama
        let tInterval = setInterval(() => {
            if(liquid.temperature < 68.5) {
                liquid.temperature += 1.45;
                document.getElementById('tempHUD').innerText = liquid.temperature.toFixed(2) + " °C";
                // Mikroskobik çökelti tanecikleri üret
                generateParticles();
            } else { clearInterval(tInterval); }
        }, 30);
    }
}

function generateParticles() {
    for(let i=0; i<3; i++) {
        liquid.particles.push({
            x: Math.random() * (canvas.width - 60) + 30,
            y: canvas.height - 40,
            vy: -(Math.random() * 2 + 1),
            size: Math.random() * 3 + 1,
            alpha: 1
        });
    }
}

function shakeBeaker() {
    targetTilt = (Math.random() - 0.5) * 0.4;
    liquid.waveHeight = 35;
    liquid.waveSpeed = 0.5;
}

// --- RENDER DÖNGÜSÜ (60 FPS REAL-TIME CANVAS MOTORU) ---
let time = 0;
function render() {
    time += 0.05;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // İnterpolasyonlar (Yumuşak geçişler)
    liquid.currentLevel += (liquid.level - liquid.currentLevel) * 0.05;
    liquid.waveHeight += (0 - liquid.waveHeight) * 0.03; // Sürtünmeyle sönümlenme
    tilt += (targetTilt - tilt) * 0.1;
    targetTilt += (0 - targetTilt) * 0.1;

    // Renk Geçiş İnterpolasyonu (Lerp Algoritması)
    liquid.currentColor.r += (liquid.targetColor.r - liquid.currentColor.r) * 0.05;
    liquid.currentColor.g += (liquid.targetColor.g - liquid.currentColor.g) * 0.05;
    liquid.currentColor.b += (liquid.targetColor.b - liquid.currentColor.b) * 0.05;
    liquid.currentColor.a += (liquid.targetColor.a - liquid.currentColor.a) * 0.05;

    let col = liquid.currentColor;
    
    ctx.save();
    // Beher merkez ekseni etrafında hafif rotasyon simülasyonu
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.rotate(tilt);
    ctx.translate(-canvas.width/2, -canvas.height/2);

    // 1. Arka Cam Yansıması ve Sıvı Hacmi
    ctx.beginPath();
    ctx.moveTo(30, liquid.currentLevel);
    
    // Sıvı Yüzeyi Dalga Simülasyonu (Sinüs Fonksiyonu)
    for (let x = 30; x <= canvas.width - 30; x += 10) {
        let y = liquid.currentLevel + Math.sin((x * 0.05) + (time * liquid.waveSpeed * 10)) * liquid.waveHeight;
        ctx.lineTo(x, y);
    }
    
    ctx.lineTo(canvas.width - 30, canvas.height - 30);
    ctx.quadraticCurveTo(canvas.width/2, canvas.height - 10, 30, canvas.height - 30);
    ctx.closePath();
    
    // Sıvı İç Gradyanı (Hacim hissi veren ışık gölgelemesi)
    let liquidGrad = ctx.createLinearGradient(0, liquid.currentLevel, 0, canvas.height);
    liquidGrad.addColorStop(0, `rgba(${col.r}, ${col.g}, ${col.b}, ${col.a})`);
    liquidGrad.addColorStop(1, `rgba(${col.r * 0.4}, ${col.g * 0.4}, ${col.b * 0.6}, ${col.a + 0.1})`);
    ctx.fillStyle = liquidGrad;
    ctx.fill();

    // 2. Parçacık (Çökelti/Kabarcık) İşleme
    for (let i = liquid.particles.length - 1; i >= 0; i--) {
        let p = liquid.particles[i];
        p.y += p.vy;
        if(p.y < liquid.currentLevel) p.alpha -= 0.02;
        
        ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        
        if (p.alpha <= 0) liquid.particles.splice(i, 1);
    }

    // 3. Ön Cam ve Çeper Çizimi (Laboratuvar Kalitesi Cam Efekti)
    ctx.beginPath();
    ctx.moveTo(30, 40);
    ctx.lineTo(30, canvas.height - 40);
    ctx.quadraticCurveTo(30, canvas.height - 20, 50, canvas.height - 20);
    ctx.lineTo(canvas.width - 50, canvas.height - 20);
    ctx.quadraticCurveTo(canvas.width - 30, canvas.height - 20, canvas.width - 30, canvas.height - 40);
    ctx.lineTo(canvas.width - 30, 40);
    
    let glassGrad = ctx.createLinearGradient(0, 0, canvas.width, 0);
    glassGrad.addColorStop(0, 'rgba(255,255,255,0.4)');
    glassGrad.addColorStop(0.08, 'rgba(255,255,255,0.05)');
    glassGrad.addColorStop(0.92, 'rgba(255,255,255,0.05)');
    glassGrad.addColorStop(1, 'rgba(255,255,255,0.4)');
    
    ctx.strokeStyle = glassGrad;
    ctx.lineWidth = 4;
    ctx.stroke();

    ctx.restore();
    requestAnimationFrame(render);
}

// Motoru ateşle
render();
</script>

</body>
</html>
