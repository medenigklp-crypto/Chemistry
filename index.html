<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ronya — YKS Kimya</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap');

:root{
  --bg:#08090f;--sf:#0f1117;--sf2:#161922;--sf3:#1c2030;--br:#1e2535;--br2:#252d40;
  --ac:#6366f1;--ac2:#818cf8;--gr:#22c55e;--rd:#ef4444;--yw:#f59e0b;
  --tx:#f1f5f9;--tx2:#94a3b8;--tx3:#475569;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh;
}
body.modal-open{overflow:hidden;}
.app{max-width:960px;margin:0 auto}
header{
  display:flex;align-items:center;justify-content:space-between;padding:12px 16px;
  background:rgba(8,9,15,0.98);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;
  border-bottom:1px solid var(--br);
}
.logo{
  font-family:'Space Grotesk',sans-serif;font-size:23px;font-weight:800;
  background:linear-gradient(135deg,#a5b4fc,#6366f1);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer;
}
.screen{display:none;padding:16px}
.screen.active{display:block}
.card{background:var(--sf);border:1px solid var(--br);border-radius:16px;padding:20px;margin:16px 0}
.btn{
  width:100%;padding:16px;background:var(--ac);color:#fff;border:none;border-radius:12px;
  font-weight:600;font-size:16px;margin:8px 0;cursor:pointer;
}
.btn:focus, input:focus, select:focus, .pt-cell:focus{
  outline:2px solid var(--ac2);outline-offset:2px;
}
.btn2{background:var(--sf2);color:var(--tx)}
.field{margin:10px 0}
label{display:block;margin:0 0 6px;color:var(--tx2);font-size:14px}
input, select{
  width:100%;padding:14px;background:#161922;border:1px solid #475569;border-radius:10px;color:white;
}
.pt-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px;margin-top:10px;
}
.pt-cell{
  background:#1e2535;border:2px solid #475569;border-radius:10px;padding:6px;text-align:center;
  cursor:pointer;transition:all .2s;height:82px;display:flex;flex-direction:column;justify-content:center;
}
.pt-cell:hover{transform:scale(1.04);border-color:#a5b4fc;box-shadow:0 0 20px rgba(99,102,241,0.25)}
.pt-cell .num{font-size:9px;color:#94a3b8}
.pt-cell .sym{font-size:18px;font-weight:800}
.pt-cell .name{font-size:8.5px;color:#cbd5e1;margin-top:2px}
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:200;
}
.modal-content{
  background:var(--sf);border:1px solid var(--br);border-radius:16px;padding:24px;max-width:420px;width:90%;text-align:center;
}
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e2535;padding:14px 24px;
  border-radius:999px;color:white;z-index:1000;opacity:0;transition:.25s;max-width:340px;text-align:center;
}
.toast.show{opacity:1}
.quiz-box{
  display:grid;gap:12px;justify-items:stretch;
}
.quiz-q{
  background:var(--sf2);border:1px solid var(--br);border-radius:12px;padding:16px;font-size:18px;
}
.quiz-actions{display:grid;gap:10px;grid-template-columns:1fr 1fr}
@media (max-width:520px){ .quiz-actions{grid-template-columns:1fr} }
.sr-only{
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo" onclick="nav('home')" tabindex="0" role="button" aria-label="Ana sayfaya dön">Ronya</div>
    <div style="color:var(--tx2);font-size:13px;">YKS Kimya</div>
  </header>

  <main>
    <section id="s-home" class="screen active" aria-labelledby="home-title">
      <div style="text-align:center;padding:40px 20px;">
        <h1 id="home-title" style="font-size:32px;margin-bottom:8px;">Kimya İçin Her Şey</h1>
        <p style="color:var(--tx2);">TYT • AYT Hazırlık</p>
      </div>
      <div class="card">
        <button class="btn" onclick="nav('pt')">🔬 Periyodik Tablo</button>
        <button class="btn" onclick="nav('mol')">⚖️ Mol Hesaplayıcı</button>
        <button class="btn" onclick="nav('quiz')">🧪 Element Testi</button>
      </div>
    </section>

    <section id="s-pt" class="screen" aria-labelledby="pt-title">
      <h2 id="pt-title">🔬 Periyodik Tablo</h2>
      <p style="color:var(--tx2);margin-bottom:12px;">Elemente dokunarak detayları gör</p>
      <div id="pt-grid" class="pt-grid" role="list" aria-label="Periyodik tablo elementleri"></div>
      <button class="btn btn2" onclick="nav('home')">← Ana Sayfa</button>
    </section>

    <section id="s-mol" class="screen" aria-labelledby="mol-title">
      <h2 id="mol-title">⚖️ Mol Hesaplayıcı</h2>
      <div class="card">
        <div class="field">
          <label for="mk0">Molar Kütle (g/mol)</label>
          <input type="number" id="mk0" placeholder="Örn: 18" inputmode="decimal" />
        </div>
        <div class="field">
          <label for="mk1">İşlem</label>
          <select id="mk1">
            <option value="m2k">Mol → Kütle</option>
            <option value="k2m">Kütle → Mol</option>
          </select>
        </div>
        <div class="field">
          <label for="mk2">Değer</label>
          <input type="number" id="mk2" placeholder="Örn: 2" inputmode="decimal" />
        </div>
        <button class="btn" onclick="calcMK()">Hesapla</button>
        <div id="mkr" style="display:none;margin-top:15px;padding:18px;background:#0f1117;border-radius:12px;text-align:center;">
          <strong>Sonuç: <span id="mkrv" style="color:#a5b4fc;font-size:20px;"></span></strong>
        </div>
      </div>
      <button class="btn btn2" onclick="nav('home')">← Ana Sayfa</button>
    </section>

    <section id="s-quiz" class="screen" aria-labelledby="quiz-title">
      <h2 id="quiz-title">🧪 Element Testi</h2>
      <div class="card quiz-box">
        <div id="quiz-q" class="quiz-q">Teste başlamak için aşağıya bas.</div>
        <div class="quiz-actions">
          <button class="btn" onclick="startQuiz()">Teste Başla</button>
          <button class="btn btn2" onclick="nextQuiz()">Yeni Soru</button>
        </div>
        <div id="quiz-feedback" style="min-height:24px;color:var(--tx2)"></div>
      </div>
      <button class="btn btn2" onclick="nav('home')">← Ana Sayfa</button>
    </section>
  </main>
</div>

<div id="detail-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-sym" aria-describedby="modal-info">
  <div class="modal-content">
    <h2 id="modal-sym" style="font-size:52px;margin:0;color:#a5b4fc;"></h2>
    <h3 id="modal-name" style="margin:8px 0 16px;color:#f1f5f9;"></h3>
    <p id="modal-info" style="color:var(--tx2);line-height:1.7;font-size:15px;"></p>
    <button class="btn" id="close-modal-btn" onclick="closeModal()" style="margin-top:20px;">Kapat</button>
  </div>
</div>

<div id="toast" class="toast" aria-live="polite" aria-atomic="true"></div>

<script>
const elements = [
  {n:1,sym:"H",name:"Hidrojen",group:"Ametal",color:"#4ade80",config:"1s¹"},
  {n:2,sym:"He",name:"Helyum",group:"Soy Gaz",color:"#f472b6",config:"1s²"},
  {n:3,sym:"Li",name:"Lityum",group:"Alkali Metal",color:"#ef4444",config:"[He] 2s¹"},
  {n:4,sym:"Be",name:"Berilyum",group:"Toprak Alkali",color:"#f97316",config:"[He] 2s²"},
  {n:57,sym:"La",name:"Lantanyum",group:"Lantanit",color:"#7dd3fc",config:"[Xe] 5d¹ 6s²"},
  {n:58,sym:"Ce",name:"Seryum",group:"Lantanit",color:"#7dd3fc",config:"[Xe] 4f¹ 5d¹ 6s²"},
  {n:59,sym:"Pr",name:"Praseodim",group:"Lantanit",color:"#7dd3fc",config:"[Xe] 4f³ 6s²"},
  {n:89,sym:"Ac",name:"Aktinyum",group:"Aktinit",color:"#94a3b8",config:"[Rn] 6d¹ 7s²"},
  {n:90,sym:"Th",name:"Toryum",group:"Aktinit",color:"#94a3b8",config:"[Rn] 6d² 7s²"},
  {n:92,sym:"U",name:"Uranyum",group:"Aktinit",color:"#94a3b8",config:"[Rn] 5f³ 6d¹ 7s²"},
  {n:118,sym:"Og",name:"Oganesson",group:"Soy Gaz",color:"#f472b6",config:"[Rn] 5f¹⁴ 6d¹⁰ 7s² 7p⁶"}
];

const quizList = [
  {q:"H sembolü hangi elementtir?", a:"hidrojen"},
  {q:"He sembolü hangi elementtir?", a:"helyum"},
  {q:"Li sembolü hangi elementtir?", a:"lityum"},
  {q:"U sembolü hangi elementtir?", a:"uranyum"}
];

let lastFocused = null;
let currentQuiz = null;

function nav(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-' + id).classList.add('active');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window.toastTimer);
  window.toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

function showDetail(el) {
  lastFocused = document.activeElement;
  document.getElementById('modal-sym').textContent = el.sym;
  document.getElementById('modal-name').textContent = el.name;
  document.getElementById('modal-info').innerHTML =
    `<strong>Atom Numarası:</strong> ${el.n}<br><strong>Grup:</strong> ${el.group}<br><strong>Elektron Konfigürasyonu:</strong> ${el.config}`;
  const modal = document.getElementById('detail-modal');
  modal.style.display = 'flex';
  document.body.classList.add('modal-open');
  document.getElementById('close-modal-btn').focus();
}

function closeModal() {
  const modal = document.getElementById('detail-modal');
  modal.style.display = 'none';
  document.body.classList.remove('modal-open');
  if (lastFocused && lastFocused.focus) lastFocused.focus();
}

function renderPeriodicTable() {
  const grid = document.getElementById('pt-grid');
  grid.innerHTML = '';
  elements.forEach(el => {
    const cell = document.createElement('button');
    cell.type = 'button';
    cell.className = 'pt-cell';
    cell.style.borderColor = el.color + '99';
    cell.setAttribute('aria-label', `${el.n}. ${el.name}, ${el.sym}, ${el.group}`);
    cell.innerHTML = `
      <div class="num">${el.n}</div>
      <div class="sym" style="color:${el.color}">${el.sym}</div>
      <div class="name">${el.name}</div>
    `;
    cell.addEventListener('click', () => showDetail(el));
    grid.appendChild(cell);
  });
}

function calcMK() {
  const mw = parseFloat(document.getElementById('mk0').value);
  const val = parseFloat(document.getElementById('mk2').value);
  const type = document.getElementById('mk1').value;
  if (!mw || !val) return toast("Değerleri doldurun");
  const result = type === "m2k" ? (val * mw).toFixed(3) + " g" : (val / mw).toFixed(4) + " mol";
  document.getElementById('mkrv').textContent = result;
  document.getElementById('mkr').style.display = 'block';
  toast("Hesaplandı ✓");
}

function nextQuiz() {
  currentQuiz = quizList[Math.floor(Math.random() * quizList.length)];
  document.getElementById('quiz-q').textContent = currentQuiz.q;
  document.getElementById('quiz-feedback').textContent = "";
}

function startQuiz() {
  nextQuiz();
  const user = prompt(currentQuiz.q + " Cevabını yaz:");
  if (user && user.toLowerCase().includes(currentQuiz.a)) {
    document.getElementById('quiz-feedback').textContent = "Doğru!";
    toast("✅ Doğru!");
  } else {
    document.getElementById('quiz-feedback').textContent = "Yanlış cevap.";
    toast("❌ Yanlış");
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('detail-modal').style.display === 'flex') closeModal();
});

document.getElementById('detail-modal').addEventListener('click', (e) => {
  if (e.target.id === 'detail-modal') closeModal();
});

document.addEventListener('DOMContentLoaded', () => {
  renderPeriodicTable();
  nextQuiz();
  toast("Hazır! Kimya uygulaması çalışıyor.");
});
</script>
</body>
</html>
