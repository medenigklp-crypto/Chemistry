<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🧪 Kimya Deney Sunumu - Öğretmen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0b0e14;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }
        #app {
            width: 100vw;
            height: 100vh;
            max-width: 1400px;
            max-height: 900px;
            background: radial-gradient(circle at 20% 30%, #1a2533, #07090e);
            border-radius: 32px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        /* ÜST ÇUBUK */
        .header {
            padding: 18px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(6px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 20;
            flex-shrink: 0;
        }
        .header h1 {
            color: #b3e5fc;
            font-weight: 300;
            letter-spacing: 2px;
            font-size: 1.5rem;
            text-shadow: 0 0 20px rgba(0, 180, 255, 0.3);
        }
        .header .exp-name {
            color: #fff;
            background: rgba(255, 193, 7, 0.15);
            padding: 6px 24px;
            border-radius: 40px;
            border: 1px solid rgba(255, 193, 7, 0.3);
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        .controls {
            display: flex;
            gap: 12px;
        }
        .controls button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ccc;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }
        .controls button:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border-color: #4fc3f7;
            box-shadow: 0 0 25px rgba(79, 195, 247, 0.2);
        }
        .controls button.active {
            background: #00bcd4;
            color: #000;
            border-color: #00bcd4;
        }

        /* ANA SAHNE */
        .scene {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* BEHER (Cam) */
        .beaker-wrapper {
            width: 420px;
            height: 480px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }
        .beaker {
            width: 340px;
            height: 430px;
            background: rgba(255, 255, 255, 0.03);
            border: 3px solid rgba(200, 220, 255, 0.25);
            border-radius: 0 0 60px 60px;
            border-top: none;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 80px rgba(79, 195, 247, 0.05), 0 20px 40px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(2px);
        }
        /* Sıvı Arka Plan (Dalga) */
        .liquid-bg {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65%;
            background: linear-gradient(180deg, rgba(46, 125, 50, 0.7), rgba(27, 94, 32, 0.9));
            transition: height 1.2s cubic-bezier(0.34, 1.56, 0.64, 1), background 1.5s ease;
            border-radius: 0 0 58px 58px;
        }
        /* Dalga üst katman (Shader efekti) */
        .wave-overlay {
            position: absolute;
            top: -10px;
            left: -20px;
            width: calc(100% + 40px);
            height: 40px;
            background: radial-gradient(ellipse at 30% 0%, rgba(255, 255, 255, 0.3) 0%, transparent 70%);
            filter: blur(3px);
            animation: waveMove 3s ease-in-out infinite alternate;
        }
        @keyframes waveMove {
            0% { transform: translateX(-10px) scaleY(0.8); opacity: 0.6; }
            100% { transform: translateX(30px) scaleY(1.2); opacity: 1; }
        }

        /* PARTİKÜL KANVASI (Ön planda) */
        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
            border-radius: 0 0 58px 58px;
        }

        /* AÇIKLAMA PANELİ */
        .info-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            max-width: 700px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 60px;
            padding: 16px 30px;
            text-align: center;
            z-index: 30;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
            transition: all 0.4s ease;
        }
        .info-panel .step-title {
            color: #ffd54f;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
        .info-panel .step-desc {
            color: #cfd8dc;
            font-size: 1rem;
            margin-top: 4px;
            font-weight: 300;
        }
        .info-panel .step-desc strong {
            color: #fff;
            font-weight: 600;
        }
        .progress-bar {
            width: 100%;
            height: 3px;
            background: #1a1a2e;
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00bcd4, #ffd54f);
            border-radius: 4px;
            transition: width 0.15s linear;
        }

        /* YAN KİMYASAL DENKLEM */
        .equation-box {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 20px 28px;
            border-radius: 20px;
            border-left: 4px solid #ffd54f;
            color: #e0e0e0;
            font-size: 1.2rem;
            font-weight: 500;
            text-align: center;
            z-index: 25;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 220px;
            opacity: 0;
            transform: translateY(-50%) scale(0.9);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
        }
        .equation-box.show {
            opacity: 1;
            transform: translateY(-50%) scale(1);
        }
        .equation-box small {
            display: block;
            font-size: 0.7rem;
            color: #78909c;
            margin-top: 6px;
            font-weight: 300;
        }

        @media (max-width: 850px) {
            .beaker-wrapper {
                transform: scale(0.7);
            }
            .equation-box {
                right: 10px;
                padding: 12px 16px;
                font-size: 0.9rem;
                max-width: 150px;
            }
            .info-panel {
                width: 90%;
                bottom: 20px;
                padding: 12px 16px;
            }
            .header h1 {
                font-size: 1rem;
            }
            .header .exp-name {
                font-size: 0.8rem;
                padding: 4px 12px;
            }
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- HEADER -->
        <div class="header">
            <h1>⚗️ Sanal Deney Gösterici</h1>
            <span class="exp-name" id="expName">🔬 Nötrleşme</span>
            <div class="controls">
                <button id="exp1" class="active" onclick="loadExperiment(1)">Deney 1</button>
                <button id="exp2" onclick="loadExperiment(2)">Deney 2</button>
                <button id="exp3" onclick="loadExperiment(3)">Deney 3</button>
                <button onclick="resetExperiment()" style="border-color:#ef5350; color:#ef5350;">↺ Sıfırla</button>
            </div>
        </div>

        <!-- SAHNE -->
        <div class="scene">
            <div class="beaker-wrapper">
                <div class="beaker" id="beaker">
                    <div class="liquid-bg" id="liquidBg"></div>
                    <div class="wave-overlay"></div>
                    <canvas id="particleCanvas"></canvas>
                </div>
            </div>

            <!-- Kimyasal Denklem -->
            <div class="equation-box" id="eqBox">
                <span id="eqText">HCl + NaOH → NaCl + H₂O</span>
                <small id="eqSub">Nötrleşme reaksiyonu</small>
            </div>
        </div>

        <!-- ALT BİLGİ PANELİ -->
        <div class="info-panel" id="infoPanel">
            <div class="step-title" id="stepTitle">🧪 Hazırlık</div>
            <div class="step-desc" id="stepDesc">Deney başlamak üzere...</div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        </div>
    </div>

    <script>
        // ------------------------------------------------------------
        // PARTİKÜL SİSTEMİ (Canvas)
        // ------------------------------------------------------------
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animFrameId = null;
        let isRunning = false;
        let currentExperiment = 1;
        let progress = 0; // 0-100
        let animSpeed = 0.5;

        // Deney konfigürasyonları
        const EXPERIMENTS = {
            1: { // Metal + Asit (Hidrojen / Yanma)
                name: '🔥 Metal + Asit (H₂)',
                liquidColor: ['rgba(30, 136, 229, 0.85)', 'rgba(21, 101, 192, 0.95)'],
                finalLiquidColor: 'rgba(13, 71, 161, 0.9)',
                startLevel: 70,
                endLevel: 40,
                steps: [
                    { prog: 0, title: '🧪 Hazırlık', desc: 'Behere çinko (Zn) metal parçaları eklenir.' },
                    { prog: 15, title: '💧 Asit Ekleme', desc: 'Hidroklorik asit (HCl) ekleniyor...' },
                    { prog: 30, title: '🫧 Gaz Çıkışı', desc: 'Hidrojen gazı (H₂) kabarcıkları oluşuyor.' },
                    { prog: 55, title: '⚡ Patlama Tehlikesi', desc: 'Hidrojen gazı havayla temas ediyor, şiddetli yanma!' },
                    { prog: 80, title: '🌊 Çözünme', desc: 'Çinko tamamen çözünür. Çinko klorür (ZnCl₂) oluşur.' },
                    { prog: 100, title: '✅ Deney Tamamlandı', desc: 'Zn + 2HCl → ZnCl₂ + H₂↑ (Gaz çıkışı)' }
                ],
                equation: 'Zn + 2HCl → ZnCl₂ + H₂↑',
                eqSub: '⚠️ Ekzotermik, hidrojen yanıcıdır.'
            },
            2: { // Nötrleşme
                name: '🧪 Asit-Baz Nötrleşmesi',
                liquidColor: ['rgba(198, 40, 40, 0.8)', 'rgba(183, 28, 28, 0.9)'],
                finalLiquidColor: 'rgba(27, 94, 32, 0.85)',
                startLevel: 60,
                endLevel: 65,
                steps: [
                    { prog: 0, title: '🧪 Hazırlık', desc: 'Beherde HCl (Asit) çözeltisi bulunuyor. pH: 2' },
                    { prog: 20, title: '⬇️ Baz Ekleme', desc: 'NaOH (Sodyum Hidroksit) damla damla ekleniyor...' },
                    { prog: 40, title: '🔄 Nötrleşme', desc: 'H⁺ + OH⁻ → H₂O (Su oluşumu, sıcaklık artar).' },
                    { prog: 65, title: '🌈 Renk Değişimi', desc: 'İndikatör (Fenolftalein) pembe renge dönüyor.' },
                    { prog: 85, title: '🧂 Tuz Oluşumu', desc: 'Na⁺ ve Cl⁻ iyonları birleşerek NaCl (Tuz) oluşturur.' },
                    { prog: 100, title: '✅ Nötr Çözelti', desc: 'pH: 7. HCl + NaOH → NaCl + H₂O' }
                ],
                equation: 'HCl + NaOH → NaCl + H₂O',
                eqSub: 'Ekzotermik, ısı açığa çıkar.'
            },
            3: { // Çökelti
                name: '⚪ Çökelti Oluşumu (AgCl)',
                liquidColor: ['rgba(250, 250, 250, 0.6)', 'rgba(200, 200, 200, 0.7)'],
                finalLiquidColor: 'rgba(200, 200, 200, 0.3)',
                startLevel: 55,
                endLevel: 60,
                steps: [
                    { prog: 0, title: '🧪 Hazırlık', desc: 'Beherde AgNO₃ (Gümüş Nitrat) çözeltisi.' },
                    { prog: 20, title: '⬇️ Klorür Ekleme', desc: 'NaCl (Sodyum Klorür) çözeltisi ekleniyor.' },
                    { prog: 40, title: '☁️ Çökelti Başlangıcı', desc: 'Ag⁺ + Cl⁻ → AgCl ↓ (Beyaz çökelti oluşumu).' },
                    { prog: 60, title: '❄️ Bulutsu Görünüm', desc: 'Sıvı içinde beyaz ipliksi tanecikler çökeliyor.' },
                    { prog: 85, title: '⏳ Çökelme Tamamlanıyor', desc: 'Tanecikler dibe çöküyor, üst sıvı berraklaşıyor.' },
                    { prog: 100, title: '✅ Çökelme Tamam', desc: 'AgNO₃ + NaCl → AgCl↓ + NaNO₃' }
                ],
                equation: 'AgNO₃ + NaCl → AgCl↓ + NaNO₃',
                eqSub: 'Beyaz peynirimsi çökelti.'
            }
        };

        // Canvas boyutlandırma
        function resizeCanvas() {
            const rect = document.getElementById('beaker').getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
        }

        // Partikül sınıfları
        class Particle {
            constructor(type, x, y) {
                this.type = type; // 'bubble', 'fire', 'smoke', 'precipitate'
                this.x = x || Math.random() * canvas.width;
                this.y = y || canvas.height * 0.5 + Math.random() * 50;
                this.size = 2 + Math.random() * 8;
                this.speedX = (Math.random() - 0.5) * 0.8;
                this.speedY = -0.5 - Math.random() * 1.8;
                this.life = 1;
                this.maxLife = 60 + Math.random() * 80;
                this.age = 0;
                this.color = 'rgba(255,255,255,0.6)';

                if (type === 'fire') {
                    this.color = `hsl(${20 + Math.random() * 30}, 100%, ${50 + Math.random() * 40}%)`;
                    this.size = 4 + Math.random() * 14;
                    this.speedY = -1 - Math.random() * 3;
                }
                if (type === 'smoke') {
                    this.color = `rgba(180, 180, 190, ${0.2 + Math.random() * 0.3})`;
                    this.size = 8 + Math.random() * 25;
                    this.speedX = (Math.random() - 0.5) * 0.3;
                    this.speedY = -0.3 - Math.random() * 0.8;
                }
                if (type === 'precipitate') {
                    this.color = `rgba(240, 240, 245, ${0.7 + Math.random() * 0.3})`;
                    this.size = 2 + Math.random() * 5;
                    this.speedX = (Math.random() - 0.5) * 0.2;
                    this.speedY = 0.3 + Math.random() * 1.2; // Aşağı çökelir
                    this.life = 1;
                    this.maxLife = 200 + Math.random() * 200;
                }
                if (type === 'bubble') {
                    this.color = `rgba(255, 255, 255, ${0.2 + Math.random() * 0.4})`;
                    this.size = 2 + Math.random() * 7;
                    this.speedX = (Math.random() - 0.5) * 0.5;
                    this.speedY = -0.8 - Math.random() * 1.5;
                }
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.age++;
                this.life = 1 - (this.age / this.maxLife);
                if (this.life < 0) this.life = 0;
                // Sınırlar
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < -50) this.life = 0;
                if (this.type === 'precipitate' && this.y > canvas.height * 0.85) {
                    this.speedY = 0;
                    this.speedX = 0;
                }
                return this.life > 0;
            }

            draw(ctx) {
                const alpha = this.life;
                ctx.globalAlpha = alpha;
                if (this.type === 'fire') {
                    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                    grad.addColorStop(0, 'rgba(255,255,200,1)');
                    grad.addColorStop(0.3, 'rgba(255,180,50,0.9)');
                    grad.addColorStop(1, 'rgba(200,50,0,0)');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.type === 'smoke') {
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * (0.5 + this.life * 0.5), 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillStyle = this.color;
                    ctx.shadowColor = 'rgba(255,255,255,0.1)';
                    ctx.shadowBlur = 6;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * (0.3 + this.life * 0.7), 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
                ctx.globalAlpha = 1;
            }
        }

        // Partikül fırlatma
        function spawnParticles(type, count, xRange, yRange) {
            for (let i = 0; i < count; i++) {
                const x = xRange ? xRange[0] + Math.random() * (xRange[1] - xRange[0]) : Math.random() * canvas.width;
                const y = yRange ? yRange[0] + Math.random() * (yRange[1] - yRange[0]) : canvas.height * 0.3 + Math.random() *
                    0.4;
                particles.push(new Particle(type, x, y));
            }
        }

        // Animasyon döngüsü
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.update());
            particles.forEach(p => p.draw(ctx));

            // Sınırda tut (max 600 partikül)
            if (particles.length > 600) particles.splice(0, particles.length - 600);

            animFrameId = requestAnimationFrame(animateParticles);
        }

        // ------------------------------------------------------------
        // DENEY MOTORU (Zaman Çizelgesi)
        // ------------------------------------------------------------
        let intervalId = null;

        function loadExperiment(num) {
            // UI aktif buton
            document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
            document.getElementById('exp' + num).classList.add('active');

            currentExperiment = num;
            resetExperiment();
            startExperiment(num);
        }

        function resetExperiment() {
            if (intervalId) clearInterval(intervalId);
            progress = 0;
            particles = [];
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('eqBox').classList.remove('show');
            const exp = EXPERIMENTS[currentExperiment];
            if (exp) {
                document.getElementById('expName').innerText = exp.name;
                const liq = document.getElementById('liquidBg');
                liq.style.height = exp.startLevel + '%';
                liq.style.background = `linear-gradient(180deg, ${exp.liquidColor[0]}, ${exp.liquidColor[1]})`;
                document.getElementById('stepTitle').innerText = '⏸️ Durduruldu';
                document.getElementById('stepDesc').innerText = 'Deney başlamak için "Sıfırla"dan sonra tekrar deney butonuna basın.';
            }
        }

        function startExperiment(num) {
            const exp = EXPERIMENTS[num];
            if (!exp) return;
            resetExperiment();

            document.getElementById('expName').innerText = exp.name;
            const liq = document.getElementById('liquidBg');
            liq.style.height = exp.startLevel + '%';
            liq.style.background = `linear-gradient(180deg, ${exp.liquidColor[0]}, ${exp.liquidColor[1]})`;

            // Progress güncelle
            let lastStepIndex = -1;
            let frameCount = 0;

            if (intervalId) clearInterval(intervalId);
            intervalId = setInterval(() => {
                frameCount++;
                progress = Math.min(100, progress + animSpeed);
                document.getElementById('progressFill').style.width = progress + '%';

                // Sıvı seviyesi değişimi (başlangıçtan sona doğru)
                const currentLevel = exp.startLevel + (exp.endLevel - exp.startLevel) * (progress / 100);
                liq.style.height = currentLevel + '%';

                // Renk geçişi
                if (progress > 50 && num === 2) { // Nötrleşme
                    liq.style.background = 'linear-gradient(180deg, rgba(76, 175, 80, 0.85), rgba(27, 94, 32, 0.95))';
                }
                if (progress > 70 && num === 2) {
                    liq.style.background = 'linear-gradient(180deg, rgba(46, 125, 50, 0.9), rgba(27, 94, 32, 0.95))';
                }
                if (progress > 40 && num === 3) { // Çökelti
                    liq.style.background = 'linear-gradient(180deg, rgba(230, 230, 235, 0.5), rgba(200, 200, 210, 0.6))';
                }
                if (progress > 30 && num === 1) { // Asit metal
                    liq.style.background = 'linear-gradient(180deg, rgba(30, 136, 229, 0.6), rgba(13, 71, 161, 0.8))';
                }

                // --- Step Kontrolü ve Partikül Olayları ---
                const steps = exp.steps;
                for (let i = 0; i < steps.length; i++) {
                    const s = steps[i];
                    if (progress >= s.prog && i !== lastStepIndex) {
                        lastStepIndex = i;
                        document.getElementById('stepTitle').innerText = s.title;
                        document.getElementById('stepDesc').innerHTML = s.desc;

                        // Denklem göster
                        if (i >= 1 && i < steps.length - 1) {
                            document.getElementById('eqText').innerText = exp.equation;
                            document.getElementById('eqSub').innerText = exp.eqSub;
                            document.getElementById('eqBox').classList.add('show');
                        } else {
                            document.getElementById('eqBox').classList.remove('show');
                        }

                        // Partikül fırlatma (zamanlamalar)
                        if (num === 1) { // Metal Asit
                            if (s.prog === 30) spawnParticles('bubble', 25, [20, 300], [100, 300]);
                            if (s.prog === 55) {
                                spawnParticles('fire', 40, [50, 280], [20, 150]);
                                spawnParticles('smoke', 20, [80, 250], [10, 100]);
                            }
                            if (s.prog === 80) spawnParticles('bubble', 15, [30, 290], [50, 200]);
                        }
                        if (num === 2) { // Nötrleşme
                            if (s.prog === 20) spawnParticles('bubble', 20, [40, 270], [150, 300]);
                            if (s.prog === 40) spawnParticles('smoke', 10, [60, 260], [100, 180]); // buhar
                            if (s.prog === 65) {
                                spawnParticles('bubble', 30, [30, 290], [100, 280]);
                            }
                        }
                        if (num === 3) { // Çökelti
                            if (s.prog === 40) spawnParticles('precipitate', 60, [40, 280], [150, 350]);
                            if (s.prog === 60) spawnParticles('precipitate', 40, [50, 270], [100, 300]);
                            if (s.prog === 85) spawnParticles('precipitate', 20, [80, 240], [50, 200]);
                        }
                    }
                }

                // Sürekli kabarcık (bazı deneylerde)
                if (num === 1 && progress > 20 && progress < 50) {
                    if (frameCount % 3 === 0) spawnParticles('bubble', 2, [40, 280], [150, 350]);
                }
                if (num === 2 && progress > 30 && progress < 60) {
                    if (frameCount % 4 === 0) spawnParticles('bubble', 1, [50, 270], [200, 320]);
                }

                // Bitiş
                if (progress >= 100) {
                    clearInterval(intervalId);
                    intervalId = null;
                    document.getElementById('stepTitle').innerText = '🏁 Deney Tamamlandı!';
                    document.getElementById('stepDesc').innerHTML =
                        '<strong>✅ Reaksiyon sonlandı. Öğrencilere gözlemlerini sorun.</strong>';
                    document.getElementById('eqBox').classList.add('show');
                    // Son partikül patlaması
                    if (num === 1) spawnParticles('fire', 15, [100, 230], [50, 150]);
                    if (num === 3) spawnParticles('precipitate', 30, [30, 290], [50, 350]);
                }
            }, 50); // 20 FPS güncelleme

            // Canvas animasyonunu başlat
            if (!animFrameId) {
                resizeCanvas();
                animateParticles();
            }
        }

        // ------------------------------------------------------------
        // BAŞLATMA ve YENİDEN BOYUTLANDIRMA
        // ------------------------------------------------------------
        window.addEventListener('resize', () => {
            resizeCanvas();
        });

        // Başlangıçta Deney 2'yi otomatik oynat (Nötrleşme en popüler)
        window.onload = function() {
            resizeCanvas();
            // Deney 2'yi aktif et ve başlat
            setTimeout(() => {
                loadExperiment(2);
            }, 300);
        };
    </script>
</body>
</html>
