const GROUPS=[...new Set(ITEMS.map(i=>i.group))];

function buildTabs(){
const bar=document.getElementById('tabBar');
const panels=document.getElementById('panels');
bar.innerHTML='';panels.innerHTML='';
GROUPS.forEach((g,idx)=>{
const btn=document.createElement('button');
btn.className='tab-btn'+(idx===0?' active':'');
btn.textContent=g;
btn.onclick=()=>switchTab(idx);
bar.appendChild(btn);
const panel=document.createElement('div');
panel.className='tab-panel'+(idx===0?' active':'');
panel.id='panel-'+idx;
const grid=document.createElement('div');
grid.className='grid';
const groupItems=ITEMS.filter(i=>i.group===g);
groupItems.forEach(item=>{
const card=document.createElement('div');
card.className='card';
card.innerHTML='<h3>'+item.name+'</h3><p>'+item.material+'</p>';
card.onclick=()=>selectItem(item,card);
grid.appendChild(card);
});
panel.appendChild(grid);
panels.appendChild(panel);
});
}

function switchTab(idx){
document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
document.getElementById('panel-'+idx).classList.add('active');
document.querySelectorAll('.tab-btn')[idx].classList.add('active');
}

function selectItem(item,cardEl){
activeItem=item;
document.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
cardEl.classList.add('selected');
let simBox=document.getElementById('simBox');
if(!simBox){
simBox=document.createElement('div');
simBox.id='simBox';
simBox.className='sim-box';
document.querySelector('.content').insertBefore(simBox,document.querySelector('.content').firstChild);
simBox.innerHTML='<div class="sim-title" id="simTitle"></div>';
simBox.appendChild(canvas);
const hint=document.createElement('p');
hint.className='hint-drag';
hint.textContent='👆 Ekrana dokunarak 3D döndürün';
simBox.appendChild(hint);
const controls=document.createElement('div');
controls.className='controls';
controls.innerHTML='<button class="ctrl-btn" onclick="toggleSpin()">🔄 Oto-Döndür</button><button class="ctrl-btn" onclick="setSpeed(0.3)">🐌 Yavaş</button><button class="ctrl-btn" onclick="setSpeed(1.5)">🚀 Hızlı</button><button class="ctrl-btn" onclick="resetView()">🎯 Sıfırla</button>';
simBox.appendChild(controls);
const props=document.createElement('div');
props.className='props';
props.id='propsBox';
document.querySelector('.content').insertBefore(props,document.querySelector('.content').firstChild.nextSibling);
}
document.getElementById('simTitle').textContent=item.name+' - 3D Görselleştirme';
const props=document.getElementById('propsBox');
props.innerHTML='<h3>📋 '+item.name+' Özellikleri</h3><div class="prop-row"><span class="prop-label">Malzeme:</span><span class="prop-val">'+item.material+'</span></div><div class="prop-row"><span class="prop-label">Hacim:</span><span class="prop-val">'+item.volume+'</span></div><div class="prop-row"><span class="prop-label">Hassasiyet:</span><span class="prop-val">'+item.precision+'</span></div><div class="prop-row"><span class="prop-label">Grup:</span><span class="prop-val">'+item.group+'</span></div><div class="prop-desc">'+item.usage+'</div>';
t=0;rotX=0.4;rotY=0.3;
if(animFrame)cancelAnimationFrame(animFrame);
loop();
window.scrollTo({top:0,behavior:'smooth'});
}

function resizeCanvas(){
const simBox=document.getElementById('simBox');
if(!simBox)return;
const rect=canvas.getBoundingClientRect();
const dpr=window.devicePixelRatio||1;
canvas.width=rect.width*dpr;
canvas.height=rect.height*dpr;
W=rect.width;H=rect.height;
c.scale(dpr,dpr);
}
window.addEventListener('resize',resizeCanvas);

canvas.addEventListener('mousedown',e=>{isDragging=true;lastX=e.clientX;lastY=e.clientY});
canvas.addEventListener('mousemove',e=>{if(!isDragging)return;const dx=e.clientX-lastX,dy=e.clientY-lastY;rotY+=dx*0.01;rotX+=dy*0.01;lastX=e.clientX;lastY=e.clientY});
canvas.addEventListener('mouseup',()=>isDragging=false);
canvas.addEventListener('mouseleave',()=>isDragging=false);
canvas.addEventListener('touchstart',e=>{isDragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;e.preventDefault()},{passive:false});
canvas.addEventListener('touchmove',e=>{if(!isDragging)return;const dx=e.touches[0].clientX-lastX,dy=e.touches[0].clientY-lastY;rotY+=dx*0.015;rotX+=dy*0.015;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;e.preventDefault()},{passive:false});
canvas.addEventListener('touchend',()=>isDragging=false);

function rotate3D(x,y,z){
let y1=y*Math.cos(rotX)-z*Math.sin(rotX);
let z1=y*Math.sin(rotX)+z*Math.cos(rotX);
let x2=x*Math.cos(rotY)+z1*Math.sin(rotY);
let z2=-x*Math.sin(rotY)+z1*Math.cos(rotY);
return{x:x2,y:y1,z:z2};
}

function project(x,y,z){
const r=rotate3D(x,y,z);
const scale=280/(350+r.z);
return{x:W/2+r.x*scale,y:H/2+r.y*scale,z:r.z,scale:scale};
}

function rgba(rgb,a){return'rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+','+a+')'}

function clear(){
c.clearRect(0,0,W,H);
c.fillStyle='#050510';
c.fillRect(0,0,W,H);
}

function drawAxes(){
const len=100;
const axes=[{x:len,y:0,z:0,label:'x',col:'#ff5555'},{x:0,y:-len,z:0,label:'y',col:'#55ff55'},{x:0,y:0,z:len,label:'z',col:'#5555ff'}];
c.strokeStyle='rgba(255,255,255,0.12)';c.lineWidth=1.5;
axes.forEach(ax=>{
const p=project(ax.x,ax.y,ax.z);
const o=project(0,0,0);
c.beginPath();c.moveTo(o.x,o.y);c.lineTo(p.x,p.y);c.stroke();
c.fillStyle=ax.col;c.font='bold 11px sans-serif';c.textAlign='center';
c.fillText(ax.label,p.x+10,p.y-5);
});
}

// ===== 3D PRIMITIVES =====
function drawCylinder(x,y,z,r,h,rgb,alpha,rotLocalX,rotLocalY){
const slices=20,stacks=1;
const triangles=[];
for(let i=0;i<slices;i++){
for(let j=0;j<stacks;j++){
const u1=(Math.PI*2/slices)*i,u2=(Math.PI*2/slices)*(i+1);
const v1=j/stacks,v2=(j+1)/stacks;
const corners=[cylPoint(x,y,z,r,h,u1,v1,rotLocalX,rotLocalY),cylPoint(x,y,z,r,h,u2,v1,rotLocalX,rotLocalY),cylPoint(x,y,z,r,h,u2,v2,rotLocalX,rotLocalY),cylPoint(x,y,z,r,h,u1,v2,rotLocalX,rotLocalY)];
triangles.push({p:[corners[0],corners[1],corners[2]],avgZ:(corners[0].z+corners[1].z+corners[2].z)/3});
triangles.push({p:[corners[0],corners[2],corners[3]],avgZ:(corners[0].z+corners[2].z+corners[3].z)/3});
}}
triangles.sort((a,b)=>b.avgZ-a.avgZ);
triangles.forEach(tri=>{
const depth=Math.max(0.15,Math.min(1,1-(tri.avgZ+120)/350));
c.beginPath();c.moveTo(tri.p[0].x,tri.p[0].y);c.lineTo(tri.p[1].x,tri.p[1].y);c.lineTo(tri.p[2].x,tri.p[2].y);c.closePath();
c.fillStyle=rgba(rgb,alpha*depth*0.6);c.fill();
c.strokeStyle=rgba(rgb,0.3*depth);c.lineWidth=0.5;c.stroke();
});
}

function cylPoint(cx,cy,cz,r,h,u,v,rotLX,rotLY){
let x=r*Math.cos(u),y=-h/2+h*v,z=r*Math.sin(u);
if(rotLX||rotLY){
let y1=y*Math.cos(rotLX||0)-z*Math.sin(rotLX||0);
let z1=y*Math.sin(rotLX||0)+z*Math.cos(rotLX||0);
let x2=x*Math.cos(rotLY||0)+z1*Math.sin(rotLY||0);
let z2=-x*Math.sin(rotLY||0)+z1*Math.cos(rotLY||0);
x=x2;y=y1;z=z2;
}
return project(cx+x,cy+y,cz+z);
}

function drawSphere(x,y,z,r,rgb,alpha){
const slices=16,stacks=12;
const triangles=[];
for(let i=0;i<slices;i++){
for(let j=0;j<stacks;j++){
const u1=(Math.PI*2/slices)*i,u2=(Math.PI*2/slices)*(i+1);
const v1=(Math.PI/stacks)*j-Math.PI/2,v2=(Math.PI/stacks)*(j+1)-Math.PI/2;
const corners=[spherePoint(x,y,z,r,u1,v1),spherePoint(x,y,z,r,u2,v1),spherePoint(x,y,z,r,u2,v2),spherePoint(x,y,z,r,u1,v2)];
triangles.push({p:[corners[0],corners[1],corners[2]],avgZ:(corners[0].z+corners[1].z+corners[2].z)/3});
triangles.push({p:[corners[0],corners[2],corners[3]],avgZ:(corners[0].z+corners[2].z+corners[3].z)/3});
}}
triangles.sort((a,b)=>b.avgZ-a.avgZ);
triangles.forEach(tri=>{
const depth=Math.max(0.15,Math.min(1,1-(tri.avgZ+120)/350));
c.beginPath();c.moveTo(tri.p[0].x,tri.p[0].y);c.lineTo(tri.p[1].x,tri.p[1].y);c.lineTo(tri.p[2].x,tri.p[2].y);c.closePath();
c.fillStyle=rgba(rgb,alpha*depth*0.6);c.fill();
c.strokeStyle=rgba(rgb,0.3*depth);c.lineWidth=0.5;c.stroke();
});
}

function spherePoint(cx,cy,cz,r,u,v){
return project(cx+r*Math.cos(v)*Math.cos(u),cy+r*Math.cos(v)*Math.sin(u),cz+r*Math.sin(v));
}

function drawDisk(x,y,z,r,rgb,alpha){
const slices=20;
const triangles=[];
const o=project(x,y,z);
for(let i=0;i<slices;i++){
const u1=(Math.PI*2/slices)*i,u2=(Math.PI*2/slices)*(i+1);
const p1=project(x+r*Math.cos(u1),y,z+r*Math.sin(u1));
const p2=project(x+r*Math.cos(u2),y,z+r*Math.sin(u2));
triangles.push({p:[o,p1,p2],avgZ:(o.z+p1.z+p2.z)/3});
}
triangles.sort((a,b)=>b.avgZ-a.avgZ);
triangles.forEach(tri=>{
const depth=Math.max(0.15,Math.min(1,1-(tri.avgZ+120)/350));
c.beginPath();c.moveTo(tri.p[0].x,tri.p[0].y);c.lineTo(tri.p[1].x,tri.p[1].y);c.lineTo(tri.p[2].x,tri.p[2].y);c.closePath();
c.fillStyle=rgba(rgb,alpha*depth*0.6);c.fill();
c.strokeStyle=rgba(rgb,0.3*depth);c.lineWidth=0.5;c.stroke();
});

function drawCone(x,y,z,r,h,rgb,alpha,dir){
const slices=20;
const triangles=[];
const tip=project(x+dir.x*h,y+dir.y*h,z+dir.z*h);
for(let i=0;i<slices;i++){
const u1=(Math.PI*2/slices)*i,u2=(Math.PI*2/slices)*(i+1);
let perp1={x:0,y:0,z:0},perp2={x:0,y:0,z:0};
if(Math.abs(dir.y)<0.9){perp1={x:-dir.z,y:0,z:dir.x}}
else{perp1={x:1,y:0,z:0}}
const len1=Math.sqrt(perp1.x*perp1.x+perp1.y*perp1.y+perp1.z*perp1.z);
perp1.x/=len1;perp1.y/=len1;perp1.z/=len1;
perp2.x=dir.y*perp1.z-dir.z*perp1.y;
perp2.y=dir.z*perp1.x-dir.x*perp1.z;
perp2.z=dir.x*perp1.y-dir.y*perp1.x;
const p1=project(x+r*(perp1.x*Math.cos(u1)+perp2.x*Math.sin(u1)),y+r*(perp1.y*Math.cos(u1)+perp2.y*Math.sin(u1)),z+r*(perp1.z*Math.cos(u1)+perp2.z*Math.sin(u1)));
const p2=project(x+r*(perp1.x*Math.cos(u2)+perp2.x*Math.sin(u2)),y+r*(perp1.y*Math.cos(u2)+perp2.y*Math.sin(u2)),z+r*(perp1.z*Math.cos(u2)+perp2.z*Math.sin(u2)));
triangles.push({p:[tip,p1,p2],avgZ:(tip.z+p1.z+p2.z)/3});
}
triangles.sort((a,b)=>b.avgZ-a.avgZ);
triangles.forEach(tri=>{
const depth=Math.max(0.15,Math.min(1,1-(tri.avgZ+120)/350));
c.beginPath();c.moveTo(tri.p[0].x,tri.p[0].y);c.lineTo(tri.p[1].x,tri.p[1].y);c.lineTo(tri.p[2].x,tri.p[2].y);c.closePath();
c.fillStyle=rgba(rgb,alpha*depth*0.6);c.fill();
c.strokeStyle=rgba(rgb,0.3*depth);c.lineWidth=0.5;c.stroke();
});
}

function drawTube(x1,y1,z1,x2,y2,z2,r,rgb,alpha){
const slices=16;
const triangles=[];
const dx=x2-x1,dy=y2-y1,dz=z2-z1;
const len=Math.sqrt(dx*dx+dy*dy+dz*dz);
const dir={x:dx/len,y:dy/len,z:dz/len};
let perp1={x:0,y:0,z:0},perp2={x:0,y:0,z:0};
if(Math.abs(dir.y)<0.9){perp1={x:-dir.z,y:0,z:dir.x}}
else{perp1={x:1,y:0,z:0}}
const len1=Math.sqrt(perp1.x*perp1.x+perp1.y*perp1.y+perp1.z*perp1.z);
perp1.x/=len1;perp1.y/=len1;perp1.z/=len1;
perp2.x=dir.y*perp1.z-dir.z*perp1.y;
perp2.y=dir.z*perp1.x-dir.x*perp1.z;
perp2.z=dir.x*perp1.y-dir.y*perp1.x;
for(let i=0;i<slices;i++){
const u1=(Math.PI*2/slices)*i,u2=(Math.PI*2/slices)*(i+1);
const c1=Math.cos(u1),s1=Math.sin(u1),c2=Math.cos(u2),s2=Math.sin(u2);
const ax1=x1+r*(perp1.x*c1+perp2.x*s1);
const ay1=y1+r*(perp1.y*c1+perp2.y*s1);
const az1=z1+r*(perp1.z*c1+perp2.z*s1);
const ax2=x1+r*(perp1.x*c2+perp2.x*s2);
const ay2=y1+r*(perp1.y*c2+perp2.y*s2);
const az2=z1+r*(perp1.z*c2+perp2.z*s2);
const bx1=x2+r*(perp1.x*c1+perp2.x*s1);
const by1=y2+r*(perp1.y*c1+perp2.y*s1);
const bz1=z2+r*(perp1.z*c1+perp2.z*s1);
const bx2=x2+r*(perp1.x*c2+perp2.x*s2);
const by2=y2+r*(perp1.y*c2+perp2.y*s2);
const bz2=z2+r*(perp1.z*c2+perp2.z*s2);
const pa1=project(ax1,ay1,az1),pa2=project(ax2,ay2,az2);
const pb1=project(bx1,by1,bz1),pb2=project(bx2,by2,bz2);
triangles.push({p:[pa1,pa2,pb2],avgZ:(pa1.z+pa2.z+pb2.z)/3});
triangles.push({p:[pa1,pb2,pb1],avgZ:(pa1.z+pb2.z+pb1.z)/3});
}
triangles.sort((a,b)=>b.avgZ-a.avgZ);
triangles.forEach(tri=>{
const depth=Math.max(0.15,Math.min(1,1-(tri.avgZ+120)/350));
c.beginPath();c.moveTo(tri.p[0].x,tri.p[0].y);c.lineTo(tri.p[1].x,tri.p[1].y);c.lineTo(tri.p[2].x,tri.p[2].y);c.closePath();
c.fillStyle=rgba(rgb,alpha*depth*0.6);c.fill();
c.strokeStyle=rgba(rgb,0.3*depth);c.lineWidth=0.5;c.stroke();
});
}

function drawBox(x,y,z,w,h,d,rgb,alpha){
const hw=w/2,hh=h/2,hd=d/2;
const corners=[project(x-hw,y-hh,z-hd),project(x+hw,y-hh,z-hd),project(x+hw,y+hh,z-hd),project(x-hw,y+hh,z-hd),project(x-hw,y-hh,z+hd),project(x+hw,y-hh,z+hd),project(x+hw,y+hh,z+hd),project(x-hw,y+hh,z+hd)];
const faces=[{p:[0,1,2,3],n:[0,0,-1]},{p:[4,5,6,7],n:[0,0,1]},{p:[0,1,5,4],n:[0,-1,0]},{p:[2,3,7,6],n:[0,1,0]},{p:[0,3,7,4],n:[-1,0,0]},{p:[1,2,6,5],n:[1,0,0]}];
const tris=[];
faces.forEach(f=>{
const p0=corners[f.p[0]],p1=corners[f.p[1]],p2=corners[f.p[2]],p3=corners[f.p[3]];
tris.push({p:[p0,p1,p2],avgZ:(p0.z+p1.z+p2.z)/3});
tris.push({p:[p0,p2,p3],avgZ:(p0.z+p2.z+p3.z)/3});
});
tris.sort((a,b)=>b.avgZ-a.avgZ);
tris.forEach(tri=>{
const depth=Math.max(0.15,Math.min(1,1-(tri.avgZ+120)/350));
c.beginPath();c.moveTo(tri.p[0].x,tri.p[0].y);c.lineTo(tri.p[1].x,tri.p[1].y);c.lineTo(tri.p[2].x,tri.p[2].y);c.closePath();
c.fillStyle=rgba(rgb,alpha*depth*0.6);c.fill();
c.strokeStyle=rgba(rgb,0.3*depth);c.lineWidth=0.5;c.stroke();
});
}

function drawGraduations(x,y,z,h,r,rgb,count){
for(let i=0;i<=count;i++){
const yy=y-h/2+(h/count)*i;
const p1=project(x-r-3,yy,z);
const p2=project(x-r+3,yy,z);
c.beginPath();c.moveTo(p1.x,p1.y);c.lineTo(p2.x,p2.y);
c.strokeStyle=rgba(rgb,0.6);c.lineWidth=1;c.stroke();
}
}
