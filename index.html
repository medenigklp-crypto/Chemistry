<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Roni Kimya Laboratuvarı - Akışkan ve Reaksiyon Motoru</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f111a; color: #f0f3f6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #00e6ff; font-weight: 400; margin-bottom: 5px; }
        .subtitle { color: #8a99ad; margin-bottom: 25px; font-size: 14px; }
        
        /* Laboratuvar Beheri */
        #beaker { width: 320px; height: 420px; border: 5px solid #e2e8f0; border-top: none; border-radius: 0 0 40px 40px; position: relative; background: rgba(255,255,255,0.03); box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.05); overflow: hidden; }
        #beaker::before { content: ''; position: absolute; top: 0; left: 20px; width: 5px; height: 90%; background: rgba(255,255,255,0.2); } /* Derece çizgisi çizgisi */

        /* Akışkan Katmanı */
        #liquid { position: absolute; bottom: 0; width: 100%; height: 0%; background: transparent; transition: height 0.4s ease, background-color 0.6s ease; }
        
        /* Kabarcık Efektleri */
        .bubble { position: absolute; bottom: 0; background: rgba(255,255,255,0.4); border-radius: 50%; animation: floatUp 2s infinite ease-in; }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.3); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-350px) scale(1.2); opacity: 0; }
        }

        /* Gösterge Paneli (HUD) */
        #hud { width: 320px; background: #161925; border: 1px solid #2d3142; border-radius: 12px; padding: 15px; margin: 20px 0; box-sizing: border-box; }
        .hud-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .hud-row:last-child { margin-bottom: 0; }
        .formula { color: #00ffaa; font-family: monospace; font-weight: bold; font-size: 15px; }

        /* Kontrol Butonları */
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-width: 500px; }
        button { padding: 12px 20px; background: #1f2335; color: #fff; border: 1px solid #3b4261; border-radius: 8px; cursor: pointer; font-weight: 500; transition: all 0.2s; }
        button:hover { background: #3b4261; border-color: #00e6ff; transform: translateY(-2px); }
        button.danger { border-color: #ff4a5a; color: #ff4a5a; }
        button.danger:hover { background: #ff4a5a; color: #fff; }
    </style>
</head>
<body>

    <h1>Roni Laboratuvar Motoru</h1>
    <div class="subtitle">Sıvı Enjeksiyonu ve Gerçek Zamanlı Efekt Test Modülü</div>

    <div id="beaker">
        <div id="liquid"></div>
    </div>

    <div id="hud">
        <div class="hud-row"><span>Sıcaklık:</span> <span><strong id="txt-temp">25</strong> °C</span></div>
        <div class="hud-row"><span>pH Seviyesi:</span> <span><strong id="txt-ph">7.0</strong></span></div>
        <div class="hud-row"><span>Kimyasal Denklem:</span> <span id="txt-eq" class="formula">-</span></div>
    </div>

    <div class="btn-group">
        <button onclick="injectChemical('Asit')">Asit Ekle (HCl)</button>
        <button onclick="injectChemical('Baz')">Baz Ekle (NaOH)</button>
        <button onclick="injectChemical('Metal')">Aktif Metal Ekle (K)</button>
        <button onclick="heatUp()">Isıyı Artır (+10°C)</button>
        <button class="danger" onclick="drainBeaker()">Beheri Boşalt</button>
    </div>

<script>
    // Laboratuvar Durum Değişkenleri
    let state = {
        volume: 0,          // Kaptaki toplam sıvı hacmi (%)
        temperature: 25,    // Santigrat derece
        ph: 7.0,            // Çözelti pH değeri
        elements: [],       // İçerideki aktif maddeler
        isReacting: false
    };

    const liquidDom = document.getElementById('liquid');

    // Renk Skalası Yönetimi
    function calculateMixColor() {
        if (state.volume === 0) return 'transparent';
        // pH değerine göre indikatör rengi (Turnusol efekti)
        if (state.ph < 5) return `rgba(255, 64, 128, ${0.3 + (state.volume/200)})`; // Asidik: Kırmızımsı
        if (state.ph > 9) return `rgba(64, 128, 255, ${0.3 + (state.volume/200)})`; // Bazik: Mavi
        return `rgba(0, 255, 170, ${0.2 + (state.volume/200)})`;                   // Nötr: Yeşil/Turkuaz
    }

    // Sıvı/Madde Enjeksiyonu
    function injectChemical(type) {
        if (state.volume >= 90) return; // Taşma koruması

        state.volume += 20;
        if (!state.elements.includes(type)) state.elements.push(type);

        // Kimyasal etkiler
        if (type === 'Asit') state.ph = Math.max(1.0, state.ph - 2.5);
        if (type === 'Baz') state.ph = Math.min(14.0, state.ph + 2.5);
        if (type === 'Metal') state.temperature += 15; // Çözünme/temas ısısı

        updatePhysics();
        checkChemicalEquations();
    }

    // Denklem ve Reaksiyon Kontrolü
    function checkChemicalEquations() {
        const eqText = document.getElementById('txt-eq');
        
        // Senaryo 1: Asit + Baz Nötrleşmesi
        if (state.elements.includes('Asit') && state.elements.includes('Baz')) {
            state.isReacting = true;
            eqText.innerText = "HCl + NaOH → NaCl + H₂O + Isı";
            state.ph = 7.0; // Nötrleşme
            state.temperature += 20; // Ekzotermik patlama efekti
            
            createBubbles(25); // Yoğun gaz/buhar çıkışı
            
            // Reaktifleri tüket
            state.elements = state.elements.filter(e => e !== 'Asit' && e !== 'Baz');
        } 
        // Senaryo 2: Asit + Metal Reaksiyonu
        else if (state.elements.includes('Asit') && state.elements.includes('Metal')) {
            state.isReacting = true;
            eqText.innerText = "2K + 2HCl → 2KCl + H₂(g) ↑";
            state.temperature += 35;
            
            createBubbles(40); // Yoğun hidrojen çıkışı
            state.elements = state.elements.filter(e => e !== 'Metal');
        }
        
        setTimeout(() => { state.isReacting = false; }, 2000);
    }

    // Kabarcık Oluşturma Mekanizması (Efekt Motoru)
    function createBubbles(count) {
        const beaker = document.getElementById('beaker');
        for (let i = 0; i < count; i++) {
            setTimeout(() => {
                if (state.volume === 0) return;
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                
                // Rastgele genişlik ve konumlendirme
                const size = Math.random() * 8 + 4;
                bubble.style.width = `${size}px`;
                bubble.style.height = `${size}px`;
                bubble.style.left = `${Math.random() * 85 + 5}%`;
                // Akışkanın içinden başlamasını sağla
                bubble.style.bottom = `${Math.random() * state.volume}%`; 
                
                beaker.appendChild(bubble);

                // Animasyon bitince element temizliği
                setTimeout(() => bubble.remove(), 2000);
            }, i * 60); // Kabarcıkların sırayla çıkması için delay
        }
    }

    // Isıtıcı Fonksiyonu
    function heatUp() {
        state.temperature += 10;
        if (state.temperature > 95) {
            createBubbles(10); // Kaynama efekti
        }
        updatePhysics();
    }

    // Fiziksel Değişimleri Ekrana Yansıt (Render Loop alternatifi)
    function updatePhysics() {
        liquidDom.style.height = `${state.volume}%`;
        liquidDom.style.backgroundColor = calculateMixColor();
        
        document.getElementById('txt-temp').innerText = state.temperature;
        document.getElementById('txt-ph').innerText = state.ph.toFixed(1);
    }

    // Beheri Sıfırla
    function drainBeaker() {
        state.volume = 0;
        state.temperature = 25;
        state.ph = 7.0;
        state.elements = [];
        state.isReacting = false;
        document.getElementById('txt-eq').innerText = "-";
        updatePhysics();
    }
</script>
</body>
</html>
