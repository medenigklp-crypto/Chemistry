<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roni 3D Kimya Laboratuvarı - Orbital Simülasyonu</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0d1117;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(22, 27, 34, 0.85);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 320px;
        }
        h2 { margin: 0 0 10px 0; font-size: 18px; color: #58a6ff; }
        p { font-size: 13px; color: #8b949e; margin: 0 0 15px 0; line-height: 1.4; }
        select {
            width: 100%;
            padding: 10px;
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }
        select:focus { border-color: #58a6ff; }
        #legend {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
        }
        .legend-item { display: flex; align-items: center; }
        .box { width: 12px; height: 12px; margin-right: 6px; border-radius: 3px; }
        .pos { background: #ff7b72; }
        .neg { background: #58a6ff; }
    </style>
    <!-- Three.js ve OrbitControls CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-panel">
        <h2>Orbital Seçimi</h2>
        <p>Görselleştirmek istediğiniz atomik orbitali seçin. Fare ile döndürebilir ve yakınlaşabilirsiniz.</p>
        <select id="orbital-select">
            <!-- S Orbitali -->
            <optgroup label="S Orbitali (l=0)">
                <option value="s">1s / 2s / 3s (Küresel)</option>
            </optgroup>
            <!-- P Orbitalleri -->
            <optgroup label="P Orbitalleri (l=1)">
                <option value="px">px</option>
                <option value="py" selected>py</option>
                <option value="pz">pz</option>
            </optgroup>
            <!-- D Orbitalleri -->
            <optgroup label="D Orbitalleri (l=2)">
                <option value="dxy">dxy</option>
                <option value="dxz">dxz</option>
                <option value="dyz">dyz</option>
                <option value="dx2y2">dx2-y2</option>
                <option value="dz2">dz2</option>
            </optgroup>
            <!-- F Orbitalleri -->
            <optgroup label="F Orbitalleri (l=3)">
                <option value="fz3">fz3</option>
                <option value="fxz2">fxz2</option>
                <option value="fyz2">fyz2</option>
                <option value="fxyz">fxyz</option>
                <option value="fz_x2y2">f_z(x2-y2)</option>
                <option value="fx_x2_3y2">f_x(x2-3y2)</option>
                <option value="fy_3x2_y2">f_y(3x2-y2)</option>
            </optgroup>
        </select>

        <div id="legend">
            <div class="legend-item"><div class="box pos"></div> (+) Dalga Fazı</div>
            <div class="legend-item"><div class="box neg"></div> (-) Dalga Fazı</div>
        </div>
    </div>

    <script>
        // --- Sahne Kurulumu ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0d1117);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 4, 7);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Işıklandırma ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight1.position.set(5, 10, 7);
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
        dirLight2.position.set(-5, -5, -5);
        scene.add(dirLight2);

        // --- Eksen Çizgileri ---
        const axesHelper = new THREE.AxesHelper(3);
        scene.add(axesHelper);

        // --- Matematiksel Küresel Harmonik Fonksiyonları ---
        // u -> theta (0 - PI), v -> phi (0 - 2PI)
        function getOrbitalRadius(type, theta, phi) {
            let r = 0;
            switch(type) {
                case 's':     return { r: 1.0, sign: 1 };
                
                case 'px':    r = Math.sin(theta) * Math.cos(phi); break;
                case 'py':    r = Math.sin(theta) * Math.sin(phi); break;
                case 'pz':    r = Math.cos(theta); break;
                
                case 'dxy':   r = Math.pow(Math.sin(theta), 2) * Math.sin(2 * phi); break;
                case 'dxz':   r = Math.sin(2 * theta) * Math.cos(phi); break;
                case 'dyz':   r = Math.sin(2 * theta) * Math.sin(phi); break;
                case 'dx2y2': r = Math.pow(Math.sin(theta), 2) * Math.cos(2 * phi); break;
                case 'dz2':   r = 0.5 * (3 * Math.pow(Math.cos(theta), 2) - 1); break;
                
                case 'fz3':        r = 0.5 * Math.cos(theta) * (5 * Math.pow(Math.cos(theta), 2) - 3); break;
                case 'fxz2':       r = 0.25 * Math.sin(theta) * (5 * Math.pow(Math.cos(theta), 2) - 1) * Math.cos(phi); break;
                case 'fyz2':       r = 0.25 * Math.sin(theta) * (5 * Math.pow(Math.cos(theta), 2) - 1) * Math.sin(phi); break;
                case 'fxyz':       r = Math.pow(Math.sin(theta), 2) * Math.cos(theta) * Math.sin(2 * phi); break;
                case 'fz_x2y2':    r = Math.pow(Math.sin(theta), 2) * Math.cos(theta) * Math.cos(2 * phi); break;
                case 'fx_x2_3y2':  r = Math.pow(Math.sin(theta), 3) * Math.cos(3 * phi); break;
                case 'fy_3x2_y2':  r = Math.pow(Math.sin(theta), 3) * Math.sin(3 * phi); break;
            }
            return { r: Math.abs(r) * 2, sign: Math.sign(r) }; 
        }

        // --- Mesh Oluşturma Fonksiyonu ---
        let currentMesh = null;

        function createOrbitalMesh(type) {
            if (currentMesh) scene.remove(currentMesh);

            const uSegments = 120;
            const vSegments = 120;
            
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];
            const indices = [];

            const colorPos = new THREE.Color(0xff7b72); // Pozitif faz (Turuncu/Kırmızımsı)
            const colorNeg = new THREE.Color(0x58a6ff); // Negatif faz (Mavi)

            // Vertexleri ve Renkleri Oluşturma
            for (let i = 0; i <= uSegments; i++) {
                const theta = (i / uSegments) * Math.PI;
                for (let j = 0; j <= vSegments; j++) {
                    const phi = (j / vSegments) * 2 * Math.PI;

                    const data = getOrbitalRadius(type, theta, phi);
                    const r = data.r;
                    const sign = data.sign;

                    // Küreselden Kartezyene Dönüşüm
                    const x = r * Math.sin(theta) * Math.cos(phi);
                    const z = r * Math.sin(theta) * Math.sin(phi); // Three.js'te yukarı eksen Y'dir, formülde Z derinliktir
                    const y = r * Math.cos(theta);

                    positions.push(x, y, z);

                    // Faza göre renk atama
                    if (sign >= 0) {
                        colors.push(colorPos.r, colorPos.g, colorPos.b);
                    } else {
                        colors.push(colorNeg.r, colorNeg.g, colorNeg.b);
                    }
                }
            }

            // İndisleri (Yüzey Üçgenlerini) Tanımlama
            for (let i = 0; i < uSegments; i++) {
                for (let j = 0; j < vSegments; j++) {
                    const a = i * (vSegments + 1) + j;
                    const b = i * (vSegments + 1) + j + 1;
                    const c = (i + 1) * (vSegments + 1) + j;
                    const d = (i + 1) * (vSegments + 1) + j + 1;

                    // Çift taraflı düzgün görünüm için iki üçgen
                    indices.push(a, c, b);
                    indices.push(b, c, d);
                }
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geometry.setIndex(indices);
            geometry.computeVertexNormals();

            // Malzeme Ayarı (Çift taraflı render ve pürüzsüz gölgelendirme için)
            const material = new THREE.MeshStandardMaterial({
                vertexColors: true,
                side: THREE.DoubleSide,
                roughness: 0.4,
                metalness: 0.1,
                wireframe: false // Çizgisel görmek isterseniz true yapabilirsiniz
            });

            currentMesh = new THREE.Mesh(geometry, material);
            scene.add(currentMesh);
        }

        // --- Başlangıç ve Seçim Dinleyicisi ---
        const select = document.getElementById('orbital-select');
        createOrbitalMesh(select.value);

        select.addEventListener('change', (e) => {
            createOrbitalMesh(e.target.value);
        });

        // --- Ekran Boyutu Değişimi ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animasyon Döngüsü ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Orbitalin kendi etrafında yavaşça dönmesi için (opsiyonel)
            if (currentMesh) {
                currentMesh.rotation.y += 0.003;
            }

            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
