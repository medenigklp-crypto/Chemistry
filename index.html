<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ronya — YKS Kimya</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap');
:root{--bg:#08090f;--sf:#0f1117;--sf2:#161922;--sf3:#1c2030;--br:#1e2535;--br2:#252d40;--ac:#6366f1;--ac2:#818cf8;--ac3:#a5b4fc;--gr:#22c55e;--rd:#ef4444;--yw:#f59e0b;--tx:#f1f5f9;--tx2:#94a3b8;--tx3:#475569;--r:14px;}
*{box-sizing:border-box;margin:0;padding:0;}body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;}
.app{padding:10px;}
header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:rgba(8,9,15,0.95);border-bottom:1px solid var(--br);position:sticky;top:0;}
.logo{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:800;background:linear-gradient(135deg,#a5b4fc,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.screen{display:none;padding:20px;}
.screen.active{display:block;}
.btn{padding:14px 20px;background:var(--ac);color:white;border:none;border-radius:12px;font-weight:600;margin:8px 0;width:100%;}
.card{background:var(--sf);padding:20px;border-radius:16px;margin:15px 0;border:1px solid var(--br);}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e2535;padding:14px 24px;border-radius:999px;color:white;z-index:1000;opacity:0;transition:.3s;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="app">

<header>
  <div class="logo" onclick="nav('home')">Ronya</div>
  <div style="font-size:13px;color:#94a3b8;">YKS Kimya</div>
</header>

<!-- ANA SAYFA -->
<div id="s-home" class="screen active">
  <h1 style="text-align:center;font-size:28px;margin:30px 0 10px;">Hoş Geldin 👋</h1>
  <p style="text-align:center;color:var(--tx2);">YKS Kimya Platformu</p>
  
  <div class="card">
    <button class="btn" onclick="nav('pt')">🔬 Periyodik Tablo</button>
    <button class="btn" onclick="nav('mol')">⚖️ Mol Hesaplayıcı</button>
    <button class="btn" onclick="nav('quiz')">🧪 Element Testi</button>
  </div>
</div>

<!-- PERİYODİK TABLO -->
<div id="s-pt" class="screen">
  <h2>🔬 Periyodik Tablo</h2>
  <p style="color:var(--tx2)">Tam versiyon yakında yüklenecek...</p>
  <button class="btn" onclick="nav('home')">← Ana Sayfa</button>
</div>

<!-- MOL HESAPLAYICI -->
<div id="s-mol" class="screen">
  <h2>⚖️ Mol Hesaplayıcı</h2>
  <div class="card">
    <input type="number" id="mk0" placeholder="Molar Kütle (g/mol) örn: 18" style="width:100%;padding:12px;margin:10px 0;background:#161922;border:1px solid #475569;border-radius:8px;color:white;">
    <select id="mk1" style="width:100%;padding:12px;margin:10px 0;background:#161922;border:1px solid #475569;border-radius:8px;color:white;">
      <option value="m2k">Mol → Kütle</option>
      <option value="k2m">Kütle → Mol</option>
    </select>
    <input type="number" id="mk2" placeholder="Değer girin" style="width:100%;padding:12px;margin:10px 0;background:#161922;border:1px solid #475569;border-radius:8px;color:white;">
    <button class="btn" onclick="calcMK()">Hesapla</button>
    <div id="mkr" style="display:none;margin-top:15px;padding:15px;background:#0f1117;border-radius:12px;">
      <strong>Sonuç: <span id="mkrv" style="color:#a5b4fc;"></span></strong>
    </div>
  </div>
  <button class="btn" onclick="nav('home')">← Ana Sayfa</button>
</div>

<!-- QUIZ -->
<div id="s-quiz" class="screen">
  <h2>🧪 Element Testi</h2>
  <p style="color:var(--tx2)">Yakında tam test sistemi eklenecek.</p>
  <button class="btn" onclick="nav('home')">← Ana Sayfa</button>
</div>

</div>

<div id="toast" class="toast"></div>

<script>
function nav(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-' + id).classList.add('active');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function calcMK() {
  const mw = parseFloat(document.getElementById('mk0').value) || 0;
  const val = parseFloat(document.getElementById('mk2').value) || 0;
  const type = document.getElementById('mk1').value;
  
  if(mw === 0 || val === 0) return toast("Lütfen değer girin");
  
  let result = type === "m2k" ? val * mw : val / mw;
  document.getElementById('mkrv').textContent = result.toFixed(4) + (type === "m2k" ? " g" : " mol");
  document.getElementById('mkr').style.display = 'block';
  toast("✅ Hesaplandı");
}

document.addEventListener('DOMContentLoaded', () => {
  toast("Ronya YKS Kimya yüklendi!");
});
</script>
</body>
</html>
