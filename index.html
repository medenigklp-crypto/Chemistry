<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ronya — YKS Kimya Platformu</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap');
:root{
  --bg:#08090f;--sf:#0f1117;--sf2:#161922;--sf3:#1c2030;
  --br:#1e2535;--br2:#252d40;
  --ac:#6366f1;--ac2:#818cf8;--ac3:#a5b4fc;
  --gr:#22c55e;--rd:#ef4444;--yw:#f59e0b;--cy:#06b6d4;
  --tx:#f1f5f9;--tx2:#94a3b8;--tx3:#475569;
  --r:14px;--rsm:8px;--rlg:20px;--rxl:28px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#08090f!important;background-color:#08090f!important;color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 1px 1px,rgba(99,102,241,.06) 1px,transparent 0);background-size:28px 28px;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;}
::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-track{background:var(--bg);} ::-webkit-scrollbar-thumb{background:var(--br2);border-radius:3px;}
/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:58px;border-bottom:1px solid var(--br);background:rgba(8,9,15,.9);backdrop-filter:blur(16px);position:sticky;top:0;z-index:100;}
.logo{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,#a5b4fc,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;cursor:pointer;display:flex;align-items:center;gap:8px;}
.logo-sub{font-size:11px;-webkit-text-fill-color:var(--tx3);font-weight:400;font-family:'Inter',sans-serif;}
nav{display:flex;gap:2px;flex-wrap:wrap;}
nav button{background:none;border:none;color:var(--tx3);font-size:13px;font-family:'Inter',sans-serif;padding:7px 11px;border-radius:var(--rsm);cursor:pointer;transition:all .2s;font-weight:500;white-space:nowrap;}
nav button:hover{background:var(--sf2);color:var(--tx);}
nav button.active{background:var(--sf2);color:var(--ac2);}
.hmb{display:none;background:none;border:1px solid var(--br);border-radius:var(--rsm);padding:7px 10px;color:var(--tx2);cursor:pointer;font-size:15px;}
@media(max-width:900px){nav{display:none;}.hmb{display:block;}}
.mnav{display:none;position:fixed;top:58px;left:0;right:0;background:var(--sf);border-bottom:1px solid var(--br);padding:10px;z-index:99;flex-wrap:wrap;gap:4px;}
.mnav#mn{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#0f1117;flex-direction:column;gap:8px;padding:80px 16px 16px;z-index:9999;overflow-y:auto;}
#mn.open{display:flex;}
#mn button{padding:12px 16px;background:var(--sf2);border:1px solid var(--br);border-radius:var(--r);color:var(--tx);font-size:14px;font-weight:600;text-align:left;cursor:pointer;}
.mnav button{background:var(--sf2);border:none;color:var(--tx2);font-size:13px;font-family:'Inter',sans-serif;padding:8px 14px;border-radius:var(--rsm);cursor:pointer;font-weight:500;}
@keyframes fi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes pop{from{opacity:0;transform:scale(.92);}to{opacity:1;transform:scale(1);}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
/* COMMON */
.pw{max-width:960px;margin:0 auto;padding:44px 20px;}
.pw.wide{max-width:1200px;}
.pw.narrow{max-width:660px;}
.ptitle{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px;}
.psub{color:var(--tx2);font-size:14px;margin-bottom:28px;line-height:1.6;}
.card{background:var(--sf);border:1px solid var(--br);border-radius:var(--rlg);padding:24px;}
.slbl{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
.inp{width:100%;background:var(--sf2);border:1px solid var(--br);border-radius:var(--r);padding:11px 15px;color:var(--tx);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--ac);}
.inp::placeholder{color:var(--tx3);}
.sel{width:100%;background:var(--sf2);border:1px solid var(--br);border-radius:var(--r);padding:11px 15px;color:var(--tx);font-size:14px;font-family:'Inter',sans-serif;outline:none;cursor:pointer;-webkit-appearance:none;}
.sel option{background:var(--sf);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 22px;border-radius:var(--r);font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:all .2s;border:none;}
.bp{background:var(--ac);color:#fff;box-shadow:0 4px 18px rgba(99,102,241,.3);}
.bp:hover{background:#4f46e5;transform:translateY(-1px);}
.bs{background:var(--sf2);color:var(--tx);border:1px solid var(--br);}
.bs:hover{border-color:var(--ac);color:var(--ac2);}
.bfull{width:100%;}
.bgrp{display:flex;gap:7px;flex-wrap:wrap;}
.ob{background:var(--sf2);border:1px solid var(--br);border-radius:var(--rsm);color:var(--tx2);font-size:13px;font-weight:500;padding:7px 14px;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;}
.ob:hover{border-color:var(--ac);color:var(--tx);}
.ob.sel2{background:rgba(99,102,241,.15);border-color:var(--ac);color:var(--ac2);}
.rb{background:var(--sf2);border:1px solid var(--br2);border-radius:var(--r);padding:18px;margin-top:18px;}
.rb .rl{font-size:11px;color:var(--tx3);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.rb .rv{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:800;color:var(--ac2);}
.rb .rv.g{color:var(--gr);}
.rb .rv.r{color:var(--rd);}
.rb .rv.y{color:var(--yw);}
.slist{list-style:none;padding:0;margin-top:10px;}
.slist li{padding:9px 12px;border-radius:var(--rsm);font-size:13px;color:var(--tx2);background:var(--sf3);margin-bottom:5px;border-left:3px solid var(--ac);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;}
@media(max-width:560px){.g2,.g3{grid-template-columns:1fr;}}
.divider{height:1px;background:var(--br);margin:20px 0;}
.badge{display:inline-flex;align-items:center;gap:5px;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.25);border-radius:100px;padding:5px 12px;font-size:11px;color:var(--ac2);font-weight:600;letter-spacing:.3px;}
/* HOME */
.hero{text-align:center;padding:72px 20px 52px;max-width:760px;margin:0 auto;}
.hero .badge{margin-bottom:24px;}
.hero h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(36px,6vw,64px);font-weight:800;line-height:1.05;letter-spacing:-2px;margin-bottom:18px;}
.hero h1 em{font-style:normal;background:linear-gradient(135deg,#a5b4fc 0%,#6366f1 60%,#818cf8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero p{font-size:16px;color:var(--tx2);max-width:500px;margin:0 auto 32px;line-height:1.7;}
.hbtns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:44px;}
.fels{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:52px;}
.fel{background:var(--sf);border:1px solid var(--br);border-radius:12px;padding:10px 14px;text-align:center;min-width:58px;}
.fel .fs{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:800;}
.fel .fn{font-size:9px;color:var(--tx3);}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-bottom:52px;}
.tc{background:var(--sf);border:1px solid var(--br);border-radius:var(--rlg);padding:22px;cursor:pointer;transition:all .2s;}
.tc:hover{border-color:var(--ac);transform:translateY(-3px);box-shadow:0 8px 28px rgba(99,102,241,.15);}
.tc .ti{font-size:26px;margin-bottom:10px;}
.tc .tt{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;margin-bottom:5px;}
.tc .td{font-size:12px;color:var(--tx2);line-height:1.5;}
.sbar{display:flex;gap:28px;justify-content:center;flex-wrap:wrap;padding:28px;background:var(--sf);border:1px solid var(--br);border-radius:var(--rxl);margin-bottom:52px;}
.si .sv{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:800;color:var(--ac2);letter-spacing:-1px;}
.si .sl{font-size:11px;color:var(--tx3);font-weight:500;margin-top:3px;text-align:center;}
/* QUIZ */
.qhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.qi{font-size:13px;color:var(--tx3);font-weight:500;}
.lsc{display:flex;gap:11px;font-size:13px;font-weight:700;}
.sc-cor{color:var(--gr);}
.sc-wro{color:var(--rd);}
.pbar{height:4px;background:var(--sf2);border-radius:100px;margin-bottom:32px;overflow:hidden;}
.pfill{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));border-radius:100px;transition:width .4s ease;}
.qcard{background:var(--sf);border:1px solid var(--br);border-radius:24px;padding:40px 32px;text-align:center;margin-bottom:18px;animation:pop .25s ease;position:relative;overflow:hidden;}
.qcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--ac),transparent);opacity:0;transition:opacity .3s;}
.qcard.ans::before{opacity:1;}
.qlbl{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-bottom:18px;}
.sbig{font-family:'Space Grotesk',sans-serif;font-size:84px;font-weight:800;line-height:1;letter-spacing:-3px;}
.nbig{font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:800;line-height:1;letter-spacing:-1px;}
.enum{font-size:11px;color:var(--tx3);margin-bottom:3px;}
.ecat{font-size:13px;color:var(--tx2);margin-top:7px;}
.ogrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;}
@media(max-width:460px){.ogrid{grid-template-columns:1fr;}}
.ob2{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:13px 14px;color:var(--tx);font-size:14px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s;text-align:left;display:flex;align-items:center;gap:9px;}
.ob2:hover:not(:disabled){border-color:var(--ac);background:rgba(99,102,241,.08);transform:translateY(-1px);}
.ob2:disabled{cursor:default;}
.ob2.cor{border-color:var(--gr);background:rgba(34,197,94,.1);color:var(--gr);}
.ob2.wro{border-color:var(--rd);background:rgba(239,68,.1);color:var(--rd);}
.ok{width:25px;height:25px;border-radius:6px;background:var(--sf2);border:1px solid var(--br);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--tx3);flex-shrink:0;}
.ob2.cor .ok{background:rgba(34,197,94,.2);border-color:var(--gr);color:var(--gr);}
.ob2.wro .ok{background:rgba(239,68,68,.2);border-color:var(--rd);color:var(--rd);}
.oex{font-family:'Space Grotesk',sans-serif;font-size:11px;color:var(--tx3);margin-left:auto;}
.fb{height:46px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;margin-bottom:11px;opacity:0;transition:opacity .3s;}
.fb.show{opacity:1;}
.fb.cor{background:rgba(34,197,94,.1);color:var(--gr);border:1px solid rgba(34,197,94,.2);}
.fb.wro{background:rgba(239,68,68,.1);color:var(--rd);border:1px solid rgba(239,68,68,.2);}
.nxt{width:100%;padding:13px;background:var(--sf2);border:1px solid var(--br);border-radius:var(--r);color:var(--tx);font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:all .2s;display:none;}
.nxt.show{display:block;}
.nxt:hover{border-color:var(--ac);color:var(--ac2);}
/* RESULTS */
.rhero{text-align:center;margin-bottom:28px;}
.rem{font-size:56px;display:block;margin-bottom:14px;}
.rhero h2{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px;}
.rhero p{color:var(--tx2);font-size:13px;}
.rpct{font-family:'Space Grotesk',sans-serif;font-size:70px;font-weight:800;letter-spacing:-3px;line-height:1;margin:14px 0 3px;}
.rpct.gr{color:var(--gr);}
.rpct.ok{color:var(--yw);}
.rpct.bd{color:var(--rd);}
.rstats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:20px;}
.rstat{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:16px;text-align:center;}
.rstat .v{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:800;margin-bottom:3px;}
.rstat .l{font-size:11px;color:var(--tx3);font-weight:600;}
.wsec{background:var(--sf);border:1px solid var(--br);border-radius:var(--rlg);padding:20px;margin-bottom:18px;}
.wsec h3{font-size:14px;font-weight:600;margin-bottom:12px;}
.wchips{display:flex;flex-wrap:wrap;gap:5px;}
.wchip{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:var(--rsm);padding:4px 10px;font-size:12px;font-weight:500;}
.wchip strong{font-family:'Space Grotesk',sans-serif;color:var(--rd);font-size:13px;margin-right:2px;}
.rbtns{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
@media(max-width:460px){.rbtns{grid-template-columns:1fr;}}
/* PERIODIC TABLE */
.ptf{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.ptfb{background:var(--sf2);border:1px solid var(--br);border-radius:100px;padding:4px 13px;font-size:12px;color:var(--tx2);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;font-weight:500;border:none;}
.ptfb:hover{color:var(--tx);}
.ptfb.on{background:rgba(99,102,241,.15);color:var(--ac2);}
.elgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(74px,1fr));gap:4px;}
.elt{background:var(--sf);border:1px solid var(--br);border-radius:9px;padding:8px 5px;text-align:center;cursor:pointer;transition:all .15s;}
.elt:hover{border-color:var(--ac);background:rgba(99,102,241,.08);transform:translateY(-2px);}
.elt.hide{display:none;}
.elt.whl{border-color:rgba(239,68,.4);background:rgba(239,68,68,.05);}
.elt .en{font-size:9px;color:var(--tx3);margin-bottom:1px;}
.elt .es{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:800;color:var(--tx);line-height:1;}
.elt .enm{font-size:9px;color:var(--tx2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.elt.g1{border-top:3px solid #ef4444;}
.elt.g2{border-top:3px solid #f97316;}
.elt.gtm{border-top:3px solid #f59e0b;}
.elt.g13{border-top:3px solid #84cc16;}
.elt.g14{border-top:3px solid #22c55e;}
.elt.g15{border-top:3px solid #06b6d4;}
.elt.g16{border-top:3px solid #3b82f6;}
.elt.g17{border-top:3px solid #8b5cf6;}
.elt.g18{border-top:3px solid #ec4899;}
.elt.glan{border-top:3px solid #64748b;}
.elt.gact{border-top:3px solid #475569;}
.ptleg{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
.ll{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--tx3);}
.ld{width:9px;height:9px;border-radius:2px;}
/* TABS */
.tabs{display:flex;gap:4px;background:var(--sf2);border-radius:var(--r);padding:4px;margin-bottom:20px;}
.tab{flex:1;padding:8px;border:none;border-radius:var(--rsm);background:none;color:var(--tx2);font-size:13px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s;}
.tab.on{background:var(--ac);color:#fff;}
.tp{display:none;}
.tp.on{display:block;}
.ltabs{display:flex;gap:3px;background:var(--sf2);border-radius:var(--r);padding:4px;margin-bottom:20px;overflow-x:auto;}
.ltab{flex-shrink:0;padding:7px 13px;border:none;border-radius:var(--rsm);background:none;color:var(--tx2);font-size:12px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s;}
.ltab.on{background:var(--ac);color:#fff;}
/* FORMULA BOX */
.fbox{background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);border-radius:var(--r);padding:14px;text-align:center;font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:var(--ac2);margin-bottom:18px;}
/* pH */
.phscale{height:26px;background:linear-gradient(90deg,#ef4444,#f97316,#eab308,#22c55e,#22c55e,#3b82f6,#8b5cf6);border-radius:100px;position:relative;margin:14px 0;}
.phm{position:absolute;top:-5px;transform:translateX(-50%);width:4px;height:36px;background:var(--tx);border-radius:2px;transition:left .5s ease;}
.phlbls{display:flex;justify-content:space-between;font-size:9px;color:var(--tx3);padding:0 3px;margin-bottom:16px;}
.phval{font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:800;letter-spacing:-2px;text-align:center;margin:6px 0;}
/* COUNTDOWN */
.cdgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:28px 0;}
@media(max-width:460px){.cdgrid{grid-template-columns:repeat(2,1fr);}}
.cdb{background:var(--sf);border:1px solid var(--br);border-radius:var(--rlg);padding:24px 14px;text-align:center;}
.cdv{font-family:'Space Grotesk',sans-serif;font-size:46px;font-weight:800;letter-spacing:-2px;color:var(--ac2);line-height:1;}
.cdl{font-size:10px;color:var(--tx3);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-top:5px;}
.etabs{display:flex;gap:7px;margin-bottom:20px;flex-wrap:wrap;}
.etab{padding:7px 16px;border:1px solid var(--br);border-radius:100px;background:var(--sf2);color:var(--tx2);font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
.etab.on{background:var(--ac);border-color:var(--ac);color:#fff;}
/* POMODORO */
.pomd{text-align:center;padding:32px 16px;}
.pomml{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;}
.pomcirc{width:190px;height:190px;margin:0 auto 28px;position:relative;}
.pomcirc svg{transform:rotate(-90deg);}
.pomcirc circle{fill:none;stroke-width:8;}
.pcbg{stroke:var(--sf2);}
.pcfg{stroke:var(--ac);stroke-linecap:round;transition:stroke-dashoffset .5s linear;}
.pominn{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.pomtm{font-family:'Space Grotesk',sans-serif;font-size:72px;font-weight:800;letter-spacing:-4px;line-height:1;}
.pombtns{display:flex;gap:9px;justify-content:center;}
.pomset{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:20px;}
@media(max-width:480px){.pomset{grid-template-columns:1fr;}}
.pomset label{display:block;font-size:11px;color:var(--tx3);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
.pomrds{display:flex;gap:5px;justify-content:center;margin:14px 0;}
.pd{width:9px;height:9px;border-radius:50%;background:var(--sf2);border:2px solid var(--br);transition:all .3s;}
.pd.done{background:var(--ac);border-color:var(--ac);}
.pd.cur{background:var(--ac2);border-color:var(--ac2);transform:scale(1.4);}
/* LEADERBOARD */
.board{background:var(--sf);border:1px solid var(--br);border-radius:var(--rlg);overflow:hidden;}
.brow{display:grid;grid-template-columns:42px 1fr 68px 68px 76px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--br);font-size:13px;gap:5px;}
.brow:last-child{border-bottom:none;}
.brow.hdr{background:var(--sf2);font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;}
.brk{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:14px;color:var(--tx3);}
.brk.gd{color:#f59e0b;}.brk.sv{color:#94a3b8;}.brk.br{color:#b45309;}
.bnm{font-weight:600;}
.bpc{font-weight:700;color:var(--ac2);text-align:right;}
.bcr{color:var(--gr);font-weight:600;text-align:right;}
.bdt{color:var(--tx3);font-size:11px;text-align:right;}
@media(max-width:520px){.bdt{display:none;}.brow{grid-template-columns:38px 1fr 58px 58px;}}
/* MODAL */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s;}
.ovl.show{opacity:1;pointer-events:all;}
.modal{background:var(--sf);border:1px solid var(--br);border-radius:var(--rxl);padding:32px;max-width:440px;width:100%;transform:scale(.95);transition:transform .25s;max-height:90vh;overflow-y:auto;}
.ovl.show .modal{transform:scale(1);}
.msbig{font-family:'Space Grotesk',sans-serif;font-size:60px;font-weight:800;color:var(--ac2);line-height:1;margin-bottom:6px;}
.modal h3{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:800;margin-bottom:3px;}
.mcat{font-size:12px;color:var(--tx2);margin-bottom:18px;}
.mrow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--br);font-size:13px;}
.mrow:last-child{border-bottom:none;}
.mrow .mk{color:var(--tx3);}
.mrow .mv{font-weight:600;}
/* EQUATION */
.eqdsp{background:var(--sf2);border:1px solid var(--br);border-radius:var(--r);padding:18px;text-align:center;font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600;margin:14px 0;min-height:58px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:6px;}
.eqc{color:var(--ac2);font-size:22px;font-weight:800;}
.eqco{color:var(--tx);}
.eqar{color:var(--tx3);margin:0 6px;}
.eqpl{color:var(--tx3);margin:0 3px;}
/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--sf2);border:1px solid var(--br);border-radius:100px;padding:10px 20px;font-size:13px;font-weight:500;color:var(--tx);z-index:300;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ===== REAL PERIODIC TABLE — Enhanced ===== */
#pt-real-grid { font-family: 'Space Grotesk', sans-serif; }
.pt-cell-wrap {
  aspect-ratio: 1;
  border-radius: 10px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  max-width: 100%;
  border: 1px solid transparent;
  transition: transform .15s cubic-bezier(.34,1.56,.64,1), box-shadow .15s ease, opacity .2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2px 1px;
  text-align: center;
  box-shadow:
    0 2px 6px rgba(0,0,0,.5),
    0 1px 2px rgba(0,0,0,.4),
    inset 0 1px 0 rgba(255,255,.18),
    inset 0 -1px 0 rgba(0,0,0,.3);
}
.pt-cell-wrap::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 55%;
  background: linear-gradient(180deg, rgba(255,255,255,.22) 0%, rgba(255,255,.04) 100%);
  pointer-events: none;
  border-radius: 10px 10px 0 0;
}
.pt-cell-wrap::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 40%;
  background: linear-gradient(to top, rgba(0,0,0,.3), transparent);
  pointer-events: none;
  border-radius: 0 0 9px 9px;
}
.pt-cell-wrap:hover {
  transform: scale(1.22) translateY(-3px);
  z-index: 20;
  box-shadow:
    0 12px 28px rgba(0,0,0,.7),
    0 4px 10px rgba(0,0,0,.4),
    0 0 20px rgba(255,255,.08),
    inset 0 1px 0 rgba(255,255,255,.3),
    inset 0 -1px 0 rgba(0,0,0,.2);
}
.pt-cell-wrap:active {
  transform: scale(1.06) translateY(-1px);
}
.pt-cn { font-size: 6.5px; font-weight: 700; line-height: 1.2; opacity: .9; }

.pt-legend-wrap {
  border-radius: 10px;
  padding: 6px 10px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  overflow: hidden;
  position: relative;
  cursor: pointer;
  transition: opacity .15s, transform .15s cubic-bezier(.34,1.56,.64,1);
  border: 1px solid transparent;
  min-height: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,.12);
}
.pt-legend-wrap:hover { opacity: .9; transform: scale(1.04) translateY(-1px); }
.pt-legend-wrap::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 50%;
  background: linear-gradient(180deg, rgba(255,255,255,.15) 0%, transparent 100%);
  border-radius: 9px 0 0;
  pointer-events: none;
}
